<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECRUIT AI · 로그인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
@font-face { font-family: 'Wooridaum'; src: url('assets/fonts/WooridaumL.ttf') format('truetype'); font-weight: 300; }
@font-face { font-family: 'Wooridaum'; src: url('assets/fonts/WooridaumR.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'Wooridaum'; src: url('assets/fonts/WooridaumB.ttf') format('truetype'); font-weight: 700; }

:root {
  --main-1: #0067AC;
  --main-2: #2482C5;
  --sub-2: #123F6D;
  --sub-3: #00AEC6;
  --text-1: #1A2233;
  --text-2: #5A6478;
  --text-3: #8A93A6;
  --border: #E8EDF3;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Wooridaum', 'Malgun Gothic', sans-serif;
  background:
    radial-gradient(circle at 15% 20%, rgba(0, 174, 198, 0.15) 0%, transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(36, 130, 197, 0.18) 0%, transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(0, 103, 172, 0.08) 0%, transparent 60%),
    linear-gradient(135deg, #EFF6FC 0%, #DCEEFA 50%, #D0E8F5 100%);
  color: var(--text-1);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: absolute;
  top: -200px;
  left: -200px;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0, 174, 198, 0.12) 0%, transparent 70%);
}

body::after {
  content: '';
  position: absolute;
  bottom: -300px;
  right: -200px;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(36, 130, 197, 0.1) 0%, transparent 70%);
}

.login-wrap {
  width: 100%;
  max-width: 460px;
  position: relative;
  z-index: 1;
}

.top-logos {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 36px;
}

.divider {
  width: 1px;
  height: 30px;
  background: rgba(0, 103, 172, 0.2);
}

.logo-abl { height: 50px; }
.logo-woori { height: 32px; opacity: 0.85; }

.login-card {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 44px 40px 40px;
  border: 1px solid rgba(255, 255, 255, 0.6);
  box-shadow:
    0 20px 60px rgba(0, 103, 172, 0.12),
    0 2px 8px rgba(0, 103, 172, 0.04);
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #0067AC 0%, #2482C5 50%, #00AEC6 100%);
}

.brand-mark {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
}

.brand-mark-text {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #0067AC 0%, #00AEC6 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.brand-mark-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: linear-gradient(135deg, #0067AC, #00AEC6);
}

.login-card h1 {
  font-size: 26px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #1A2233 0%, #123F6D 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 13px;
  color: var(--text-3);
  text-align: center;
  margin-bottom: 32px;
}

.form-group {
  margin-bottom: 18px;
  position: relative;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-2);
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

.input-wrap {
  position: relative;
}

.input-wrap i {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  font-size: 18px;
  transition: color 0.15s;
}

.form-group input {
  font-family: inherit;
  width: 100%;
  padding: 14px 16px 14px 44px;
  font-size: 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  outline: none;
  transition: all 0.2s;
  background: rgba(255, 255, 255, 0.7);
}

.form-group input:focus {
  border-color: var(--main-1);
  box-shadow: 0 0 0 4px rgba(0, 103, 172, 0.08);
  background: white;
}

.form-group input:focus ~ i,
.input-wrap:focus-within i {
  color: var(--main-1);
}

.login-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #0067AC 0%, #2482C5 50%, #00AEC6 100%);
  background-size: 200% 200%;
  background-position: 0% 50%;
  color: white;
  border: none;
  border-radius: 10px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 14px rgba(0, 103, 172, 0.25);
  letter-spacing: 0.3px;
}

.login-btn:hover {
  background-position: 100% 50%;
  box-shadow: 0 8px 20px rgba(0, 103, 172, 0.35);
  transform: translateY(-1px);
}

.login-btn:active {
  transform: translateY(0);
}

.login-btn i {
  font-size: 18px;
  transition: transform 0.2s;
}

.login-btn:hover i { transform: translateX(3px); }

.demo-hint {
  background: linear-gradient(135deg, rgba(229, 244, 250, 0.7), rgba(212, 237, 247, 0.5));
  border: 1px solid rgba(0, 174, 198, 0.2);
  border-radius: 10px;
  padding: 14px 16px;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.8;
}

.demo-hint-title {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 700;
  color: var(--main-1);
  margin-bottom: 6px;
}

.demo-hint-title i { font-size: 14px; }

.demo-hint strong { color: var(--main-1); font-weight: 700; }

.error-msg {
  background: #FEF1F1;
  color: #C72D2D;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
  align-items: center;
  gap: 6px;
}

.error-msg.show { display: flex; }

.footer {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: var(--text-3);
}
</style>
</head>
<body>

<div class="login-wrap">

  <div class="top-logos">
    <img src="assets/logos/abl-logo.png" alt="ABL생명" class="logo-abl">
    <div class="divider"></div>
    <img src="assets/logos/woori-logo.png" alt="우리금융그룹" class="logo-woori">
  </div>

  <div class="login-card">

    <div class="brand-mark">
      <span class="brand-mark-dot"></span>
      <span class="brand-mark-text">RECRUIT AI</span>
      <span class="brand-mark-dot"></span>
    </div>

    <h1>채용 AI 솔루션</h1>
    <p class="subtitle">사번을 입력하여 로그인 해주세요</p>

    <div class="error-msg" id="errorMsg">
      <i class="ti ti-alert-circle"></i>
      <span>사번을 입력해주세요.</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="empId">사번</label>
        <div class="input-wrap">
          <i class="ti ti-id-badge-2"></i>
          <input type="text" id="empId" placeholder="예: 10234" autocomplete="off" autofocus>
        </div>
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <div class="input-wrap">
          <i class="ti ti-lock"></i>
          <input type="password" id="password" placeholder="시연용 - 아무 값" autocomplete="off">
        </div>
      </div>

      <button type="submit" class="login-btn">
        로그인 <i class="ti ti-arrow-right"></i>
      </button>
    </form>

    <div class="demo-hint">
      <div class="demo-hint-title"><i class="ti ti-info-circle"></i> 시연 안내</div>
      · 사번이 <strong>1</strong>로 시작 → HR 담당자 화면<br>
      · 사번이 <strong>2</strong>로 시작 → 현업 리더 화면<br>
      · 비밀번호는 아무거나 입력
    </div>
  </div>

  <div class="footer">
    © 2026 ABL생명 × 서강대 HEROs · 시연용 프로토타입
  </div>

</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const empId = document.getElementById('empId').value.trim();
  const errorMsg = document.getElementById('errorMsg');

  if (!empId) {
    errorMsg.classList.add('show');
    return;
  }

  errorMsg.classList.remove('show');
  const role = empId.startsWith('2') ? 'manager' : 'hr';
  sessionStorage.setItem('empId', empId);
  sessionStorage.setItem('role', role);

  if (role === 'hr') {
    window.location.href = 'dashboard-hr.html';
  } else {
    window.location.href = 'dashboard-manager.html';
  }
});
</script>

</body>
</html>
