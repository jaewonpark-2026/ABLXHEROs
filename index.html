<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABL 채용 AI · 로그인</title>
<style>
@font-face {
  font-family: 'Wooridaum';
  src: url('assets/fonts/WooridaumL.ttf') format('truetype');
  font-weight: 300;
}
@font-face {
  font-family: 'Wooridaum';
  src: url('assets/fonts/WooridaumR.ttf') format('truetype');
  font-weight: 400;
}
@font-face {
  font-family: 'Wooridaum';
  src: url('assets/fonts/WooridaumB.ttf') format('truetype');
  font-weight: 700;
}

:root {
  --main-1: #0067AC;
  --main-2: #2482C5;
  --sub-2: #123F6D;
  --bg-page: #F7F9FC;
  --border: #E5E9F0;
  --text-1: #1A2233;
  --text-2: #5A6478;
  --text-3: #8A93A6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Wooridaum', 'Malgun Gothic', sans-serif;
  background: var(--bg-page);
  color: var(--text-1);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-wrap {
  width: 100%;
  max-width: 440px;
}

.top-logos {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
}

.top-logos img { height: 36px; }
.divider { width: 1px; height: 28px; background: var(--border); }

.login-card {
  background: white;
  border-radius: 16px;
  padding: 48px 40px;
  border: 1px solid var(--border);
}

.login-card h1 {
  font-size: 24px;
  font-weight: 700;
  color: var(--main-1);
  margin-bottom: 6px;
  text-align: center;
}

.login-card .subtitle {
  font-size: 13px;
  color: var(--text-3);
  text-align: center;
  margin-bottom: 32px;
}

.form-group { margin-bottom: 20px; }

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-2);
  margin-bottom: 8px;
}

.form-group input {
  font-family: inherit;
  width: 100%;
  padding: 14px 16px;
  font-size: 15px;
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  transition: all 0.15s;
}

.form-group input:focus {
  border-color: var(--main-1);
  box-shadow: 0 0 0 3px rgba(0, 103, 172, 0.1);
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: var(--main-1);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s;
}

.login-btn:hover { background: var(--sub-2); }

.demo-hint {
  background: #F5F9FD;
  border: 1px dashed #BCD4E8;
  border-radius: 8px;
  padding: 12px 14px;
  margin-top: 20px;
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.7;
}

.demo-hint strong { color: var(--main-1); }

.error-msg {
  background: #FEF1F1;
  color: #C72D2D;
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}

.error-msg.show { display: block; }

.footer {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: var(--text-3);
}
</style>
</head>
<body>

<div class="login-wrap">

  <div class="top-logos">
    <img src="assets/logos/woori-logo.png" alt="우리금융그룹">
    <div class="divider"></div>
    <img src="assets/logos/abl-logo.png" alt="ABL생명">
  </div>

  <div class="login-card">
    <h1>채용 AI 솔루션</h1>
    <p class="subtitle">사번을 입력하여 로그인 해주세요</p>

    <div class="error-msg" id="errorMsg">사번을 입력해주세요.</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="empId">사번</label>
        <input type="text" id="empId" placeholder="예: 10234" autocomplete="off" autofocus>
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="시연용 - 아무 값" autocomplete="off">
      </div>

      <button type="submit" class="login-btn">로그인</button>
    </form>

    <div class="demo-hint">
      <strong>시연 안내</strong><br>
      · 사번이 <strong>1</strong>로 시작 → HR 담당자 화면<br>
      · 사번이 <strong>2</strong>로 시작 → 현업 리더 화면<br>
      · 비밀번호는 아무거나 입력
    </div>
  </div>

  <div class="footer">
    © 2026 ABL생명 × 서강대 HEROs · 시연용 프로토타입
  </div>

</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const empId = document.getElementById('empId').value.trim();
  const errorMsg = document.getElementById('errorMsg');

  if (!empId) {
    errorMsg.textContent = '사번을 입력해주세요.';
    errorMsg.classList.add('show');
    return;
  }

  errorMsg.classList.remove('show');

  // 사번 첫자리로 권한 분기 (시연용 단순 로직)
  const role = empId.startsWith('2') ? 'manager' : 'hr';

  // 로컬에 저장 (다른 페이지에서 권한 확인용)
  sessionStorage.setItem('empId', empId);
  sessionStorage.setItem('role', role);

  // 권한별로 다른 페이지로 이동
  if (role === 'hr') {
    window.location.href = 'dashboard-hr.html';
  } else {
    window.location.href = 'dashboard-manager.html';
  }
});
</script>

</body>
</html>
