<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자소서 상세 분석 - ABL 채용 AI</title>
<style>
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumL.ttf') format('truetype'); font-weight: 300; }
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumR.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumB.ttf') format('truetype'); font-weight: 700; }

:root {
  --main-1: #0067AC;
  --main-2: #2482C5;
  --sub-2: #123F6D;
  --sub-3: #00AEC6;
  --sub-4: #00AFAD;
  --bg-page: #F7F9FC;
  --border: #E5E9F0;
  --text-1: #1A2233;
  --text-2: #5A6478;
  --text-3: #8A93A6;
  --hl-bg: #FFF4D6;
  --hl-border: #F0C040;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Wooridaum', 'Malgun Gothic', sans-serif;
  background: var(--bg-page);
  color: var(--text-1);
  min-height: 100vh;
  line-height: 1.6;
}

.header {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left { display: flex; align-items: center; gap: 16px; }
.platform-name { font-size: 16px; font-weight: 700; color: var(--main-1); text-decoration: none; letter-spacing: -0.3px; }
.platform-name:hover { color: var(--sub-2); }
.header-divider { width: 1px; height: 22px; background: var(--border); }
.logo-abl { height: 32px; }
.logo-woori { height: 22px; opacity: 0.85; }
.header-title { font-size: 15px; font-weight: 700; color: var(--main-1); }

.back-btn {
  background: none; border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 6px;
  font-family: inherit; font-size: 12px; color: var(--text-2);
  cursor: pointer; text-decoration: none;
}
.back-btn:hover { background: var(--bg-page); }

.main { max-width: 1100px; margin: 0 auto; padding: 32px; }

.profile-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
}

.profile-info h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.profile-meta { color: var(--text-2); font-size: 13px; }

.score-summary {
  display: flex;
  gap: 16px;
}

.score-big {
  text-align: center;
  background: var(--bg-page);
  padding: 14px 22px;
  border-radius: 8px;
  min-width: 110px;
}

.score-big-label { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
.score-big-value { font-size: 28px; font-weight: 700; color: var(--main-1); }

.tab-bar {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}

.tab {
  flex: 1;
  padding: 10px 16px;
  background: none;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-2);
  cursor: pointer;
  text-align: center;
}

.tab.active { background: var(--main-1); color: white; }

.section {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 16px;
}

.section-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::before {
  content: '';
  width: 4px;
  height: 16px;
  background: var(--main-1);
  border-radius: 2px;
}

.essay-block {
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px dashed var(--border);
}

.essay-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

.essay-question {
  font-size: 13px;
  color: var(--text-2);
  background: var(--bg-page);
  padding: 12px 14px;
  border-radius: 6px;
  margin-bottom: 12px;
  line-height: 1.7;
}

.essay-value-tag {
  display: inline-block;
  background: #E6F1FB;
  color: var(--main-1);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 10px;
  font-weight: 700;
  margin-bottom: 12px;
}

.essay-content {
  font-size: 14px;
  line-height: 1.9;
  color: var(--text-1);
}

.highlight {
  background: var(--hl-bg);
  border-bottom: 2px solid var(--hl-border);
  padding: 1px 2px;
  position: relative;
  cursor: help;
}

.highlight:hover .tooltip { display: block; }

.tooltip {
  display: none;
  position: absolute;
  bottom: 100%;
  left: 0;
  background: var(--text-1);
  color: white;
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 4px;
  white-space: nowrap;
  margin-bottom: 4px;
  z-index: 10;
}

.strengths-list {
  list-style: none;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.strengths-list li {
  background: var(--bg-page);
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 13px;
  border-left: 3px solid var(--main-1);
  padding-left: 12px;
}

.values-chart {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.value-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.value-name {
  width: 56px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-2);
}

.value-bar-wrap {
  flex: 1;
  background: var(--bg-page);
  height: 22px;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.value-bar {
  background: var(--main-1);
  height: 100%;
  transition: width 0.6s ease;
}

.value-score { width: 32px; font-size: 12px; font-weight: 700; text-align: right; }

.assessment-box {
  background: #F5F9FD;
  border-left: 3px solid var(--main-1);
  padding: 14px 18px;
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text-1);
  margin-top: 14px;
}

.verification-item {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
}

.verification-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.priority-badge {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 8px;
  font-weight: 700;
}

.priority-high { background: #FEF1F1; color: #C72D2D; }
.priority-medium { background: #FFF4D6; color: #9A6D00; }

.verification-category {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 700;
}

.verification-point {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 6px;
}

.verification-question {
  font-size: 12px;
  color: var(--text-2);
  background: var(--bg-page);
  padding: 10px 12px;
  border-radius: 6px;
  line-height: 1.7;
}

.question-group { margin-bottom: 20px; }

.question-group:last-child { margin-bottom: 0; }

.question-group-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--main-1);
  margin-bottom: 8px;
}

.question-list {
  list-style: none;
}

.question-list li {
  background: var(--bg-page);
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 6px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.question-list li::before {
  content: 'Q';
  background: var(--main-1);
  color: white;
  width: 18px;
  height: 18px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}

.tab-content { display: none; }
.tab-content.active { display: block; }

.empty-msg {
  text-align: center;
  padding: 40px;
  color: var(--text-3);
  font-size: 13px;
}

.actions-bar {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 20px;
}

.btn-action {
  padding: 10px 20px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: none;
}

.btn-primary { background: var(--main-1); color: white; }
.btn-primary:hover { background: var(--sub-2); }

.btn-secondary {
  background: white; color: var(--main-1);
  border: 1px solid var(--main-1);
}
.btn-secondary:hover { background: #F5F9FD; }

@media (max-width: 768px) {
  .strengths-list { grid-template-columns: 1fr; }
  .profile-card { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a class="platform-name" href="../../dashboard-hr.html">RECRUIT AI</a>
    <div class="header-divider"></div>
    <img class="logo-abl" src="../../assets/logos/abl-logo.png" alt="ABL생명">
    <div class="header-divider"></div>
    <img class="logo-woori" src="../../assets/logos/woori-logo.png" alt="우리금융그룹">
    <div class="header-divider"></div>
    <span class="header-title">자소서 AI 분석</span>
  </div>
  <a href="index.html" class="back-btn">← 지원자 목록</a>
</div>

<div class="main" id="main">
  <div class="empty-msg">로딩 중...</div>
</div>

<script>
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function highlightText(content, highlights) {
  if (!highlights || highlights.length === 0) return content;
  let result = content;
  highlights.forEach(h => {
    const escaped = h.text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(
      new RegExp(escaped, 'g'),
      `<span class="highlight">${h.text}<span class="tooltip">${h.reason}</span></span>`
    );
  });
  return result;
}

function render(data) {
  const main = document.getElementById('main');

  const hasFullData = data.essays && data.essays.length > 0;

  if (!hasFullData) {
    main.innerHTML = `
      <div class="profile-card">
        <div class="profile-info">
          <h1>${data.name}</h1>
          <div class="profile-meta">${data.position} · ${data.applied_date} 지원</div>
        </div>
      </div>
      <div class="section">
        <div class="empty-msg">
          <p style="font-size: 14px; margin-bottom: 8px;">자소서 분석 데이터가 아직 입력되지 않았습니다.</p>
          <p style="font-size: 12px;"><code>data/resumes/${data.id}.json</code> 파일을 채워주세요.</p>
        </div>
      </div>`;
    return;
  }

  const sum = data.summary;
  const values = sum.core_values_alignment;
  const sortedValues = Object.entries(values).sort((a, b) => b[1] - a[1]);

  main.innerHTML = `
    <div class="profile-card">
      <div class="profile-info">
        <h1>${data.name}</h1>
        <div class="profile-meta">${data.position} · 경력 ${data.career_years}년 · ${data.applied_date} 지원</div>
      </div>
      <div class="score-summary">
        <div class="score-big">
          <div class="score-big-label">컬쳐핏</div>
          <div class="score-big-value">${sum.culture_fit_score}</div>
        </div>
        <div class="score-big">
          <div class="score-big-label">직무 적합도</div>
          <div class="score-big-value">${sum.ai_match_score}</div>
        </div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab active" data-tab="summary">종합 분석</button>
      <button class="tab" data-tab="essays">자소서 하이라이트</button>
      <button class="tab" data-tab="verification">검증 포인트</button>
      <button class="tab" data-tab="questions">면접 질문 추천</button>
    </div>

    <div class="tab-content active" id="tab-summary">
      <div class="section">
        <div class="section-title">핵심 강점</div>
        <ul class="strengths-list">
          ${sum.key_strengths.map(s => `<li>${s}</li>`).join('')}
        </ul>
      </div>

      <div class="section">
        <div class="section-title">5대 핵심가치 부합도</div>
        <div class="values-chart">
          ${sortedValues.map(([name, score]) => `
            <div class="value-row">
              <div class="value-name">${name}</div>
              <div class="value-bar-wrap">
                <div class="value-bar" style="width: ${score}%;"></div>
              </div>
              <div class="value-score">${score}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-title">AI 종합 평가</div>
        <div class="assessment-box">${sum.overall_assessment}</div>
      </div>
    </div>

    <div class="tab-content" id="tab-essays">
      <div class="section">
        <div class="section-title">자소서 하이라이트</div>
        <p style="font-size: 12px; color: var(--text-3); margin-bottom: 20px;">
          AI가 직무 적합성과 컬쳐핏 관점에서 중요하다고 판단한 문장에 하이라이트했습니다. 마우스를 올리면 이유가 표시됩니다.
        </p>
        ${data.essays.map((e, i) => `
          <div class="essay-block">
            <div class="essay-question">Q${i+1}. ${e.question}</div>
            <div class="essay-value-tag">매칭 가치 · ${e.matched_value}</div>
            <div class="essay-content">${highlightText(e.content, e.highlights)}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="tab-content" id="tab-verification">
      <div class="section">
        <div class="section-title">면접 시 검증 포인트</div>
        <p style="font-size: 12px; color: var(--text-3); margin-bottom: 20px;">
          AI가 자소서 내용 중 추가 검증이 필요하다고 판단한 항목입니다.
        </p>
        ${data.verification_points.map(v => `
          <div class="verification-item">
            <div class="verification-top">
              <span class="priority-badge priority-${v.priority}">${v.priority === 'high' ? '높음' : '중간'}</span>
              <span class="verification-category">${v.category}</span>
            </div>
            <div class="verification-point">${v.point}</div>
            <div class="verification-question">💬 ${v.suggested_question}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="tab-content" id="tab-questions">
      <div class="section">
        <div class="section-title">면접 질문 추천</div>
        <div class="question-group">
          <div class="question-group-title">▸ 역량 검증</div>
          <ul class="question-list">
            ${data.recommended_questions.competency.map(q => `<li>${q}</li>`).join('')}
          </ul>
        </div>
        <div class="question-group">
          <div class="question-group-title">▸ 컬쳐핏 검증</div>
          <ul class="question-list">
            ${data.recommended_questions.culture_fit.map(q => `<li>${q}</li>`).join('')}
          </ul>
        </div>
        <div class="question-group">
          <div class="question-group-title">▸ 심화 질문</div>
          <ul class="question-list">
            ${data.recommended_questions.deep_dive.map(q => `<li>${q}</li>`).join('')}
          </ul>
        </div>
      </div>
    </div>

    <div class="actions-bar">
      <button class="btn-action btn-secondary" onclick="window.print()">리포트 인쇄</button>
      <button class="btn-action btn-primary" onclick="alert('면접 일정 조율 모듈로 이동합니다. (시연용)')">면접 일정 잡기 →</button>
    </div>
  `;

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('tab-' + t.dataset.tab).classList.add('active');
    });
  });
}

const id = getParam('id') || '001';
fetch(`data/resumes/${id}.json`)
  .then(r => r.json())
  .then(render)
  .catch(() => {
    document.getElementById('main').innerHTML = '<div class="empty-msg">지원자 정보를 불러올 수 없습니다.</div>';
  });

if (!sessionStorage.getItem('empId')) {
  window.location.href = '../../index.html';
}
</script>

</body>
</html>
