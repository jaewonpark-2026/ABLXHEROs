<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자소서 상세 분석 · RECRUIT AI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumL.ttf') format('truetype'); font-weight: 300; }
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumR.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumB.ttf') format('truetype'); font-weight: 700; }

:root {
  --main-1: #0067AC; --main-2: #2482C5; --sub-2: #123F6D; --sub-3: #00AEC6;
  --bg-page: #F6F9FC; --border: #E8EDF3;
  --text-1: #1A2233; --text-2: #5A6478; --text-3: #8A93A6;
  --grad-side: linear-gradient(180deg, #2482C5 0%, #1A8FC9 45%, #00AEC6 100%);
  --grad-blue: linear-gradient(135deg, #0067AC 0%, #2482C5 50%, #00AEC6 100%);
  --grad-card-icon: linear-gradient(135deg, #E6F1FB 0%, #D0E5F5 100%);
  --sidebar-w: 232px;
  --sidebar-w-collapsed: 68px;
  --hl-bg: #FFF4D6; --hl-border: #F0C040;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Wooridaum', 'Malgun Gothic', sans-serif; background: var(--bg-page); color: var(--text-1); line-height: 1.6; }

.layout { display: grid; grid-template-columns: var(--sidebar-w) minmax(0, 1fr); min-height: 100vh; transition: grid-template-columns 0.25s; }
.layout.collapsed { grid-template-columns: var(--sidebar-w-collapsed) 1fr; }

.sidebar { background: var(--grad-side); color: white; display: flex; flex-direction: column; position: relative; overflow: hidden; }
.sidebar::after { content: ''; position: absolute; bottom: -80px; right: -80px; width: 260px; height: 260px; border-radius: 50%; background: rgba(255,255,255,0.04); }
.sidebar::before { content: ''; position: absolute; top: -40px; left: -40px; width: 160px; height: 160px; border-radius: 50%; background: rgba(0, 174, 198, 0.12); }

.brand { padding: 26px 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.12); position: relative; z-index: 1; text-decoration: none; color: inherit; display: block; }
.brand-name { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 3px; background: linear-gradient(135deg, #ffffff 0%, #B5E0F2 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.brand-sub { font-size: 11px; opacity: 0.65; letter-spacing: 0.2px; }

.nav { padding: 18px 14px; flex: 1; position: relative; z-index: 1; }
.nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.5; padding: 0 14px 8px; margin-top: 8px; font-weight: 700; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.78); cursor: pointer; margin-bottom: 2px; transition: all 0.15s; text-decoration: none; }
.nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
.nav-item.active { background: rgba(255,255,255,0.16); color: white; box-shadow: inset 3px 0 0 #00AEC6; }
.nav-item i { font-size: 18px; }

.sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 1; display: flex; align-items: center; gap: 8px; }
.sidebar-footer img { height: 24px; opacity: 0.85; filter: brightness(0) invert(1); }
.sidebar-footer-text { font-size: 10px; opacity: 0.55; }

.main-area { display: flex; flex-direction: column; }

.topbar { background: white; border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.topbar-left { display: flex; align-items: center; gap: 14px; }
.divider { width: 1px; height: 22px; background: var(--border); }
.logo-abl { height: 32px; }
.logo-woori { height: 22px; opacity: 0.85; }
.user-info { font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 12px; }
.user-badge { background: linear-gradient(135deg, #E6F1FB, #D5E8F5); color: var(--main-1); padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.user-badge i { font-size: 14px; }
.logout-btn { background: none; border: 1px solid var(--border); padding: 7px 14px; border-radius: 6px; font-family: inherit; font-size: 12px; color: var(--text-2); cursor: pointer; font-weight: 700; }
.logout-btn:hover { background: var(--bg-page); }

.back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text-2); text-decoration: none; margin-bottom: 16px; }
.back-link:hover { color: var(--main-1); }

.content { padding: 28px 40px 40px; max-width: 1200px; }

.profile-card { background: white; border-radius: 12px; padding: 24px 28px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.profile-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--grad-blue); }

.profile-info h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
.profile-meta { color: var(--text-2); font-size: 13px; }

.score-summary { display: flex; gap: 14px; }
.score-big { text-align: center; background: var(--bg-page); padding: 14px 24px; border-radius: 10px; min-width: 110px; }
.score-big-label { font-size: 11px; color: var(--text-3); margin-bottom: 4px; font-weight: 700; }
.score-big-value { font-size: 28px; font-weight: 700; background: var(--grad-blue); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }

.tab-bar { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 5px; display: flex; gap: 4px; margin-bottom: 16px; }
.tab { flex: 1; padding: 11px 16px; background: none; border: none; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 700; color: var(--text-2); cursor: pointer; text-align: center; transition: all 0.15s; }
.tab.active { background: var(--grad-blue); color: white; }

.section { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; margin-bottom: 14px; }

.section-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.section-title::before { content: ''; width: 4px; height: 16px; border-radius: 2px; background: var(--grad-blue); }

.essay-block { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px dashed var(--border); }
.essay-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.essay-question { font-size: 13px; color: var(--text-2); background: var(--bg-page); padding: 12px 14px; border-radius: 8px; margin-bottom: 12px; line-height: 1.7; }
.essay-value-tag { display: inline-flex; align-items: center; gap: 4px; background: linear-gradient(135deg, #E6F1FB, #D5E8F5); color: var(--main-1); font-size: 11px; padding: 4px 12px; border-radius: 12px; font-weight: 700; margin-bottom: 12px; }
.essay-value-tag i { font-size: 13px; }
.essay-content { font-size: 14px; line-height: 1.9; color: var(--text-1); }

.highlight { background: var(--hl-bg); border-bottom: 2px solid var(--hl-border); padding: 1px 3px; position: relative; cursor: help; }
.highlight:hover .tooltip { display: block; }
.tooltip { display: none; position: absolute; bottom: 100%; left: 0; background: var(--text-1); color: white; font-size: 11px; padding: 6px 10px; border-radius: 4px; white-space: nowrap; margin-bottom: 4px; z-index: 10; }

.strengths-list { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.strengths-list li { background: var(--bg-page); padding: 12px 14px; border-radius: 8px; font-size: 13px; padding-left: 16px; position: relative; }
.strengths-list li::before { content: ''; position: absolute; left: 0; top: 12px; bottom: 12px; width: 3px; border-radius: 0 2px 2px 0; background: var(--grad-blue); }

.values-chart { display: flex; flex-direction: column; gap: 10px; }
.value-row { display: flex; align-items: center; gap: 12px; }
.value-name { width: 56px; font-size: 12px; font-weight: 700; color: var(--text-2); }
.value-bar-wrap { flex: 1; background: var(--bg-page); height: 22px; border-radius: 6px; overflow: hidden; position: relative; }
.value-bar { background: var(--grad-blue); height: 100%; transition: width 0.6s ease; }
.value-score { width: 32px; font-size: 12px; font-weight: 700; text-align: right; }

.assessment-box { background: linear-gradient(135deg, #F5F9FD, #ECF4FB); border-left: 3px solid var(--main-1); padding: 14px 18px; border-radius: 0 8px 8px 0; font-size: 13px; line-height: 1.8; color: var(--text-1); margin-top: 14px; }

.verification-item { border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
.verification-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.priority-badge { font-size: 10px; padding: 3px 8px; border-radius: 8px; font-weight: 700; }
.priority-high { background: linear-gradient(135deg, #FEF1F1, #FCD5D5); color: #C72D2D; }
.priority-medium { background: linear-gradient(135deg, #FFF4D6, #FCE9B0); color: #9A6D00; }
.verification-category { font-size: 11px; color: var(--text-3); font-weight: 700; }
.verification-point { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.verification-question { font-size: 12px; color: var(--text-2); background: var(--bg-page); padding: 10px 12px; border-radius: 8px; line-height: 1.7; display: flex; gap: 6px; align-items: flex-start; }
.verification-question i { color: var(--main-1); margin-top: 1px; }

.question-group { margin-bottom: 20px; }
.question-group:last-child { margin-bottom: 0; }
.question-group-title { font-size: 13px; font-weight: 700; color: var(--main-1); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.question-list { list-style: none; }
.question-list li { background: var(--bg-page); padding: 11px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 10px; }
.question-list li::before { content: 'Q'; background: var(--grad-blue); color: white; width: 20px; height: 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }

.tab-content { display: none; }
.tab-content.active { display: block; }

.empty-msg { text-align: center; padding: 40px; color: var(--text-3); font-size: 13px; }

.actions-bar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
.btn-action { padding: 11px 22px; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; border: none; display: flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--grad-blue); color: white; }
.btn-primary:hover { opacity: 0.9; }
.btn-secondary { background: white; color: var(--main-1); border: 1px solid var(--main-1); }
.btn-secondary:hover { background: #F5F9FD; }


.sidebar-toggle { position: absolute; top: 22px; right: 12px; width: 28px; height: 28px; border-radius: 6px; background: rgba(255,255,255,0.15); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; transition: background 0.15s; }
.sidebar-toggle:hover { background: rgba(255,255,255,0.25); }
.sidebar-toggle i { font-size: 16px; }
.layout.collapsed .brand-name, .layout.collapsed .brand-sub, .layout.collapsed .nav-section-title, .layout.collapsed .nav-item span.label { display: none; }
.layout.collapsed .nav-item { justify-content: center; padding: 11px 0; }
.layout.collapsed .brand { padding: 26px 12px 24px; text-align: center; }
.layout.collapsed .sidebar-toggle { right: 50%; transform: translateX(50%); top: 70px; }

  .sidebar { display: none; }
  .strengths-list { grid-template-columns: 1fr; }
  .profile-card { flex-direction: column; align-items: flex-start; }
}

@media (max-width: 1100px) {
  .layout { grid-template-columns: var(--sidebar-w-collapsed) minmax(0, 1fr); }
  .brand-name, .brand-sub, .nav-section-title, .nav-item span.label { display: none; }
  .nav-item { justify-content: center; padding: 11px 0; }
  .brand { padding: 26px 12px 24px; text-align: center; }
  .sidebar-toggle { display: none; }
  .module-grid { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .content { padding: 32px 28px; }
  .topbar { padding: 14px 24px; }
  .applicant-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
}
@media (max-width: 720px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); transform: translateX(-100%); transition: transform 0.25s; z-index: 100; }
  .layout.mobile-open .sidebar { transform: translateX(0); }
  .layout.mobile-open .brand-name, .layout.mobile-open .brand-sub, .layout.mobile-open .nav-section-title, .layout.mobile-open .nav-item span.label { display: block; }
  .layout.mobile-open .nav-section-title { display: block; }
  .layout.mobile-open .nav-item { justify-content: flex-start; padding: 11px 14px; }
  .layout.mobile-open .brand { padding: 26px 24px 24px; text-align: left; }
  .mobile-menu-btn { display: flex; }
  .module-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .content { padding: 24px 16px; }
  .topbar { padding: 12px 16px; }
  .logo-woori { display: none; }
  .topbar-left .divider { display: none; }
  .user-info span { display: none; }
  .user-info .user-badge { display: flex; }
  .user-info .logout-btn { display: block; }
  .applicant-grid { grid-template-columns: 1fr; }
  .profile-card { flex-direction: column; align-items: flex-start; }
  .strengths-list { grid-template-columns: 1fr; }
  .tab-bar { flex-wrap: wrap; }
  .tab { flex: 1 1 45%; }
}
.mobile-menu-btn { display: none; background: none; border: 1px solid var(--border); width: 36px; height: 36px; border-radius: 6px; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); margin-right: 8px; }
.mobile-menu-btn:hover { background: var(--bg-page); }
.mobile-menu-btn i { font-size: 18px; }

</style>
</head>
<body>

<div class="layout">

  <div class="sidebar">
      <button class="sidebar-toggle" onclick="document.querySelector('.layout').classList.toggle('collapsed')"><i class="ti ti-menu-2"></i></button>
      <a class="brand" href="../../dashboard-hr.html">
      <div class="brand-name">RECRUIT AI</div>
      <div class="brand-sub">ABL × HEROs</div>
    </a>
    <div class="nav">
      <div class="nav-section-title">메인</div>
      <a class="nav-item" href="../../dashboard-hr.html"><i class="ti ti-layout-dashboard"></i> <span class="label">대시보드</span></a>
      <div class="nav-section-title">채용 업무</div>
      <a class="nav-item" href="../jd-writer/index.html"><i class="ti ti-clipboard-text"></i> <span class="label">JD 작성</span></a>
      <a class="nav-item active" href="index.html"><i class="ti ti-file-search"></i> <span class="label">자소서 분석</span></a>
      <a class="nav-item" href="../schedule/index.html"><i class="ti ti-calendar-event"></i> <span class="label">면접 일정</span></a>
      <a class="nav-item" href="../interview/index.html"><i class="ti ti-microphone-2"></i> <span class="label">면접 진행</span></a>
      <a class="nav-item" href="../report/index.html"><i class="ti ti-chart-histogram"></i> <span class="label">채용 리포트</span></a>
    </div>
    
  </div>

  <div class="main-area">
    <div class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="document.querySelector('.layout').classList.toggle('mobile-open')"><i class="ti ti-menu-2"></i></button>
        <img class="logo-abl" src="../../assets/logos/abl-logo.png" alt="ABL생명">
        <div class="divider"></div>
        <img class="logo-woori" src="../../assets/logos/woori-logo.png" alt="우리금융그룹">
      </div>
      <div class="user-info">
        <span class="user-badge"><i class="ti ti-user"></i> HR 담당자</span>
        <span id="userId">사번 -</span>
        <button class="logout-btn" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <div class="content">
      <a href="index.html" class="back-link"><i class="ti ti-arrow-left"></i> 지원자 목록으로</a>
      <div id="main">
        <div class="empty-msg">로딩 중...</div>
      </div>
    </div>
  </div>

</div>

<script>
function getParam(name) { return new URLSearchParams(window.location.search).get(name); }

function highlightText(content, highlights) {
  if (!highlights || highlights.length === 0) return content;
  let result = content;
  highlights.forEach(h => {
    const escaped = h.text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(new RegExp(escaped, 'g'), `<span class="highlight">${h.text}<span class="tooltip">${h.reason}</span></span>`);
  });
  return result;
}

function render(data) {
  const main = document.getElementById('main');
  const hasFullData = data.essays && data.essays.length > 0;

  if (!hasFullData) {
    main.innerHTML = `
      <div class="profile-card">
        <div class="profile-info">
          <h1>${data.name}</h1>
          <div class="profile-meta">${data.position} · ${data.applied_date} 지원</div>
        </div>
      </div>
      <div class="section">
        <div class="empty-msg">
          <p style="font-size: 14px; margin-bottom: 8px;">자소서 분석 데이터가 아직 입력되지 않았습니다.</p>
          <p style="font-size: 12px;"><code>data/resumes/${data.id}.json</code> 파일을 채워주세요.</p>
        </div>
      </div>`;
    return;
  }

  const sum = data.summary;
  const values = sum.core_values_alignment;
  const sortedValues = Object.entries(values).sort((a, b) => b[1] - a[1]);

  main.innerHTML = `
    <div class="profile-card">
      <div class="profile-info">
        <h1>${data.name}</h1>
        <div class="profile-meta">${data.position} · 경력 ${data.career_years}년 · ${data.applied_date} 지원</div>
      </div>
      <div class="score-summary">
        <div class="score-big">
          <div class="score-big-label">컬쳐핏</div>
          <div class="score-big-value">${sum.culture_fit_score}</div>
        </div>
        <div class="score-big">
          <div class="score-big-label">직무 적합도</div>
          <div class="score-big-value">${sum.ai_match_score}</div>
        </div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab active" data-tab="summary">종합 분석</button>
      <button class="tab" data-tab="essays">자소서 하이라이트</button>
      <button class="tab" data-tab="verification">검증 포인트</button>
      <button class="tab" data-tab="questions">면접 질문 추천</button>
    </div>

    <div class="tab-content active" id="tab-summary">
      <div class="section">
        <div class="section-title">핵심 강점</div>
        <ul class="strengths-list">
          ${sum.key_strengths.map(s => `<li>${s}</li>`).join('')}
        </ul>
      </div>

      <div class="section">
        <div class="section-title">5대 핵심가치 부합도</div>
        <div class="values-chart">
          ${sortedValues.map(([name, score]) => `
            <div class="value-row">
              <div class="value-name">${name}</div>
              <div class="value-bar-wrap"><div class="value-bar" style="width: ${score}%;"></div></div>
              <div class="value-score">${score}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-title">AI 종합 평가</div>
        <div class="assessment-box">${sum.overall_assessment}</div>
      </div>
    </div>

    <div class="tab-content" id="tab-essays">
      <div class="section">
        <div class="section-title">자소서 하이라이트</div>
        <p style="font-size: 12px; color: var(--text-3); margin-bottom: 20px;">
          AI가 직무 적합성과 컬쳐핏 관점에서 중요하다고 판단한 문장에 하이라이트했습니다. 마우스를 올리면 이유가 표시됩니다.
        </p>
        ${data.essays.map((e, i) => `
          <div class="essay-block">
            <div class="essay-question">Q${i+1}. ${e.question}</div>
            <div class="essay-value-tag"><i class="ti ti-sparkles"></i> ${e.matched_value}</div>
            <div class="essay-content">${highlightText(e.content, e.highlights)}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="tab-content" id="tab-verification">
      <div class="section">
        <div class="section-title">면접 시 검증 포인트</div>
        <p style="font-size: 12px; color: var(--text-3); margin-bottom: 20px;">
          AI가 자소서 내용 중 추가 검증이 필요하다고 판단한 항목입니다.
        </p>
        ${data.verification_points.map(v => `
          <div class="verification-item">
            <div class="verification-top">
              <span class="priority-badge priority-${v.priority}">${v.priority === 'high' ? '높음' : '중간'}</span>
              <span class="verification-category">${v.category}</span>
            </div>
            <div class="verification-point">${v.point}</div>
            <div class="verification-question"><i class="ti ti-message-circle"></i><span>${v.suggested_question}</span></div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="tab-content" id="tab-questions">
      <div class="section">
        <div class="section-title">면접 질문 추천</div>
        <div class="question-group">
          <div class="question-group-title"><i class="ti ti-target"></i> 역량 검증</div>
          <ul class="question-list">
            ${data.recommended_questions.competency.map(q => `<li>${q}</li>`).join('')}
          </ul>
        </div>
        <div class="question-group">
          <div class="question-group-title"><i class="ti ti-heart-handshake"></i> 컬쳐핏 검증</div>
          <ul class="question-list">
            ${data.recommended_questions.culture_fit.map(q => `<li>${q}</li>`).join('')}
          </ul>
        </div>
        <div class="question-group">
          <div class="question-group-title"><i class="ti ti-zoom-question"></i> 심화 질문</div>
          <ul class="question-list">
            ${data.recommended_questions.deep_dive.map(q => `<li>${q}</li>`).join('')}
          </ul>
        </div>
      </div>
    </div>

    <div class="actions-bar">
      <button class="btn-action btn-secondary" onclick="window.print()"><i class="ti ti-printer"></i> 리포트 인쇄</button>
      <button class="btn-action btn-primary" onclick="alert('면접 일정 조율 모듈로 이동합니다. (시연용)')">면접 일정 잡기 <i class="ti ti-arrow-right"></i></button>
    </div>
  `;

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('tab-' + t.dataset.tab).classList.add('active');
    });
  });
}

const id = getParam('id') || '001';
fetch(`data/resumes/${id}.json`).then(r => r.json()).then(render)
  .catch(() => { document.getElementById('main').innerHTML = '<div class="empty-msg">지원자 정보를 불러올 수 없습니다.</div>'; });

const empId = sessionStorage.getItem('empId');
if (!empId) window.location.href = '../../index.html';
document.getElementById('userId').textContent = '사번 ' + empId;

function logout() { sessionStorage.clear(); window.location.href = '../../index.html'; }
</script>

</body>
</html>
