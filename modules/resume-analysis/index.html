<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자소서 분석 - ABL 채용 AI</title>
<style>
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumL.ttf') format('truetype'); font-weight: 300; }
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumR.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumB.ttf') format('truetype'); font-weight: 700; }

:root {
  --main-1: #0067AC;
  --main-2: #2482C5;
  --sub-2: #123F6D;
  --sub-3: #00AEC6;
  --bg-page: #F7F9FC;
  --border: #E5E9F0;
  --text-1: #1A2233;
  --text-2: #5A6478;
  --text-3: #8A93A6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Wooridaum', 'Malgun Gothic', sans-serif;
  background: var(--bg-page);
  color: var(--text-1);
  min-height: 100vh;
}

.header {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left { display: flex; align-items: center; gap: 16px; }
.platform-name { font-size: 16px; font-weight: 700; color: var(--main-1); text-decoration: none; letter-spacing: -0.3px; }
.platform-name:hover { color: var(--sub-2); }
.header-divider { width: 1px; height: 22px; background: var(--border); }
.logo-abl { height: 32px; }
.logo-woori { height: 22px; opacity: 0.85; }
.header-title { font-size: 15px; font-weight: 700; color: var(--main-1); }

.back-btn {
  background: none;
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 12px;
  color: var(--text-2);
  cursor: pointer;
  text-decoration: none;
}
.back-btn:hover { background: var(--bg-page); }

.main { max-width: 1200px; margin: 0 auto; padding: 32px; }

.page-title {
  margin-bottom: 8px;
  font-size: 24px;
  font-weight: 700;
}

.page-subtitle {
  color: var(--text-2);
  font-size: 14px;
  margin-bottom: 24px;
}

.toolbar {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  min-width: 200px;
  padding: 9px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 13px;
  outline: none;
}
.search-box:focus { border-color: var(--main-1); }

.filter-btn {
  padding: 8px 14px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 12px;
  color: var(--text-2);
  cursor: pointer;
}
.filter-btn.active { background: var(--main-1); color: white; border-color: var(--main-1); }

.applicant-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.applicant-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  color: inherit;
}

.applicant-card:hover {
  border-color: var(--main-1);
  transform: translateY(-2px);
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.applicant-info { flex: 1; }
.applicant-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.applicant-position { font-size: 12px; color: var(--text-2); }

.status-badge {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 10px;
  font-weight: 700;
  white-space: nowrap;
}

.status-1 { background: #FFF4D6; color: #9A6D00; }
.status-2 { background: #E0F5F7; color: #00798A; }
.status-3 { background: #E6F1FB; color: var(--main-1); }
.status-4 { background: #E8F5E9; color: #2E7D32; }

.card-meta {
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 16px;
  display: flex;
  gap: 10px;
}

.scores {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.score-item {
  flex: 1;
  background: var(--bg-page);
  border-radius: 6px;
  padding: 10px;
  text-align: center;
}

.score-label { font-size: 10px; color: var(--text-3); margin-bottom: 4px; }
.score-value { font-size: 18px; font-weight: 700; color: var(--main-1); }

.value-tag {
  display: inline-block;
  background: #E6F1FB;
  color: var(--main-1);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 10px;
  font-weight: 700;
}

.empty-state {
  text-align: center;
  padding: 60px;
  color: var(--text-3);
}

@media (max-width: 600px) {
  .applicant-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a class="platform-name" href="../../dashboard-hr.html">RECRUIT AI</a>
    <div class="header-divider"></div>
    <img class="logo-abl" src="../../assets/logos/abl-logo.png" alt="ABL생명">
    <div class="header-divider"></div>
    <img class="logo-woori" src="../../assets/logos/woori-logo.png" alt="우리금융그룹">
    <div class="header-divider"></div>
    <span class="header-title">자소서 AI 분석</span>
  </div>
  <a href="../../dashboard-hr.html" class="back-btn">← 대시보드</a>
</div>

<div class="main">
  <h1 class="page-title">지원자 목록</h1>
  <p class="page-subtitle">AI가 자소서를 분석하여 핵심 역량과 컬쳐핏을 자동으로 평가했습니다.</p>

  <div class="toolbar">
    <input type="text" class="search-box" id="searchInput" placeholder="이름 또는 직무로 검색">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="진행 중">진행 중</button>
    <button class="filter-btn" data-filter="완료">평가 완료</button>
  </div>

  <div class="applicant-grid" id="grid"></div>
</div>

<script>
let allApplicants = [];
let currentFilter = 'all';
let currentSearch = '';

function statusClass(status) {
  if (status.includes('대기')) return 'status-1';
  if (status.includes('서류')) return 'status-2';
  if (status.includes('면접')) return 'status-3';
  if (status.includes('완료')) return 'status-4';
  return 'status-1';
}

function render() {
  const grid = document.getElementById('grid');
  let filtered = allApplicants;

  if (currentFilter === '진행 중') filtered = filtered.filter(a => !a.status.includes('완료'));
  if (currentFilter === '완료') filtered = filtered.filter(a => a.status.includes('완료'));

  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(a =>
      a.name.toLowerCase().includes(q) || a.position.toLowerCase().includes(q)
    );
  }

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">조건에 맞는 지원자가 없습니다.</div>';
    return;
  }

  grid.innerHTML = filtered.map(a => `
    <a href="detail.html?id=${a.id}" class="applicant-card">
      <div class="card-top">
        <div class="applicant-info">
          <div class="applicant-name">${a.name}</div>
          <div class="applicant-position">${a.position}</div>
        </div>
        <span class="status-badge ${statusClass(a.status)}">${a.status}</span>
      </div>
      <div class="card-meta">
        <span>경력 ${a.career_years}년</span>
        <span>·</span>
        <span>${a.applied_date} 지원</span>
      </div>
      <div class="scores">
        <div class="score-item">
          <div class="score-label">컬쳐핏</div>
          <div class="score-value">${a.culture_fit_score}</div>
        </div>
        <div class="score-item">
          <div class="score-label">직무 적합도</div>
          <div class="score-value">${a.ai_match_score}</div>
        </div>
      </div>
      <span class="value-tag">주요 가치 · ${a.top_value}</span>
    </a>
  `).join('');
}

fetch('data/applicants.json')
  .then(r => r.json())
  .then(data => {
    allApplicants = data.applicants;
    render();
  });

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

if (!sessionStorage.getItem('empId')) {
  window.location.href = '../../index.html';
}
</script>

</body>
</html>
