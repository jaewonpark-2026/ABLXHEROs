<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD 상세 · RECRUIT AI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumL.ttf') format('truetype'); font-weight: 300; }
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumR.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'Wooridaum'; src: url('../../assets/fonts/WooridaumB.ttf') format('truetype'); font-weight: 700; }

:root {
  --main-1: #0067AC; --main-2: #2482C5; --sub-2: #123F6D; --sub-3: #00AEC6;
  --bg-page: #F6F9FC; --border: #E8EDF3;
  --text-1: #1A2233; --text-2: #5A6478; --text-3: #8A93A6;
  --grad-side: linear-gradient(180deg, #2482C5 0%, #1A8FC9 45%, #00AEC6 100%);
  --grad-blue: linear-gradient(135deg, #0067AC 0%, #2482C5 50%, #00AEC6 100%);
  --grad-card-icon: linear-gradient(135deg, #E6F1FB 0%, #D0E5F5 100%);
  --sidebar-w: 232px; --sidebar-w-collapsed: 68px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Wooridaum', 'Malgun Gothic', sans-serif; background: var(--bg-page); color: var(--text-1); }

.layout { display: grid; grid-template-columns: var(--sidebar-w) minmax(0, 1fr); min-height: 100vh; transition: grid-template-columns 0.25s; }
.layout.collapsed { grid-template-columns: var(--sidebar-w-collapsed) 1fr; }
.sidebar { background: var(--grad-side); color: white; display: flex; flex-direction: column; position: relative; overflow: hidden; }
.sidebar::after { content: ''; position: absolute; bottom: -80px; right: -80px; width: 260px; height: 260px; border-radius: 50%; background: rgba(255,255,255,0.04); }
.sidebar::before { content: ''; position: absolute; top: -40px; left: -40px; width: 160px; height: 160px; border-radius: 50%; background: rgba(0, 174, 198, 0.12); }
.brand { padding: 26px 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.12); position: relative; z-index: 1; text-decoration: none; color: inherit; display: block; }
.brand-name { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 3px; background: linear-gradient(135deg, #ffffff, #B5E0F2); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.brand-sub { font-size: 11px; opacity: 0.65; }
.sidebar-toggle { position: absolute; top: 22px; right: 12px; width: 28px; height: 28px; border-radius: 6px; background: rgba(255,255,255,0.15); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
.nav { padding: 18px 14px; flex: 1; position: relative; z-index: 1; }
.nav-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.5; padding: 0 14px 8px; margin-top: 8px; font-weight: 700; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.78); margin-bottom: 2px; text-decoration: none; }
.nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
.nav-item.active { background: rgba(255,255,255,0.16); color: white; box-shadow: inset 3px 0 0 #00AEC6; }
.nav-item i { font-size: 18px; }

.layout.collapsed .brand-name, .layout.collapsed .brand-sub, .layout.collapsed .nav-section-title, .layout.collapsed .nav-item span.label { display: none; }
.layout.collapsed .nav-item { justify-content: center; padding: 11px 0; }
.layout.collapsed .brand { padding: 26px 12px 24px; text-align: center; }
.layout.collapsed .sidebar-toggle { right: 50%; transform: translateX(50%); top: 70px; }

@media (max-width: 1200px) {
  .layout { grid-template-columns: var(--sidebar-w-collapsed) minmax(0, 1fr); }
  .brand-name, .brand-sub, .nav-section-title, .nav-item span.label { display: none; }
  .nav-item { justify-content: center; padding: 11px 0; }
  .brand { padding: 26px 12px 24px; text-align: center; }
  .sidebar-toggle { display: none; }
  .split-layout { grid-template-columns: 1fr !important; }
}
@media (max-width: 720px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); transform: translateX(-100%); z-index: 100; }
  .layout.mobile-open .sidebar { transform: translateX(0); }
  .mobile-menu-btn { display: flex; }
}
.mobile-menu-btn { display: none; background: none; border: 1px solid var(--border); width: 36px; height: 36px; border-radius: 6px; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); }

.main-area { display: flex; flex-direction: column; }
.topbar { background: white; border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.topbar-left { display: flex; align-items: center; gap: 14px; }
.divider { width: 1px; height: 22px; background: var(--border); }
.logo-abl { height: 32px; }
.logo-woori { height: 22px; opacity: 0.85; }
.user-info { font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 12px; }
.user-badge { background: linear-gradient(135deg, #E6F1FB, #D5E8F5); color: var(--main-1); padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.user-badge.manager-role { background: linear-gradient(135deg, #E0F5F7, #C5EBEF); color: var(--sub-3); }
.logout-btn { background: none; border: 1px solid var(--border); padding: 7px 14px; border-radius: 6px; font-family: inherit; font-size: 12px; color: var(--text-2); cursor: pointer; font-weight: 700; }

.back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text-2); text-decoration: none; margin-bottom: 14px; }
.back-link:hover { color: var(--main-1); }

.content { padding: 24px 28px 40px; max-width: 1400px; }

.page-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.page-title-area h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
.page-meta { font-size: 13px; color: var(--text-2); display: flex; gap: 8px; flex-wrap: wrap; }
.status-pill { font-size: 12px; padding: 6px 14px; border-radius: 14px; font-weight: 700; }
.status-amber { background: linear-gradient(135deg, #FFF4D6, #FCE9B0); color: #9A6D00; }
.status-blue { background: linear-gradient(135deg, #E6F1FB, #D5E8F5); color: var(--main-1); }
.status-green { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); color: #2E7D32; }

.stepper { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; }
.stepper-row { display: flex; gap: 8px; align-items: center; }
.step { flex: 1; display: flex; align-items: center; gap: 10px; }
.step-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.step-circle.done { background: var(--grad-blue); color: white; }
.step-circle.current { background: white; color: var(--main-1); border: 2px solid var(--main-1); box-shadow: 0 0 0 4px rgba(0, 103, 172, 0.1); }
.step-circle.pending { background: var(--bg-page); color: var(--text-3); border: 1.5px solid var(--border); }
.step-circle.done i { font-size: 16px; }
.step-text { font-size: 12px; }
.step-name { font-weight: 700; color: var(--text-1); margin-bottom: 2px; }
.step.pending .step-name { color: var(--text-3); }
.step-status { font-size: 10px; color: var(--text-3); }
.step-line { flex: 0 1 30px; height: 2px; background: var(--border); margin-top: 16px; }
.step-line.done { background: var(--grad-blue); }

.split-layout { display: grid; grid-template-columns: 380px minmax(0, 1fr); gap: 16px; align-items: flex-start; }

.panel { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 22px 24px; }
.panel-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.panel-title i { color: var(--main-1); font-size: 18px; }

.req-block { margin-bottom: 14px; }
.req-block:last-child { margin-bottom: 0; }
.req-label { font-size: 11px; color: var(--text-3); font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
.req-value { font-size: 13px; color: var(--text-1); line-height: 1.6; }
.req-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.req-tag { background: var(--bg-page); color: var(--text-2); padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.req-tag.value-tag { background: linear-gradient(135deg, #E6F1FB, #D5E8F5); color: var(--main-1); }

/* 요구자격 6개 리스트 */
.qual-list { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
.qual-item { background: var(--bg-page); border-radius: 8px; padding: 10px 12px; border-left: 3px solid var(--main-2); }
.qual-item-label { font-size: 11px; font-weight: 700; color: var(--main-1); margin-bottom: 3px; }
.qual-item-ko { font-size: 10px; color: var(--text-3); font-weight: 400; margin-left: 4px; }
.qual-item-value { font-size: 12px; color: var(--text-1); line-height: 1.55; }

/* 승인 절차 */
.approval-flow { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
.approval-stage { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; background: var(--bg-page); }
.approval-stage.done { background: linear-gradient(135deg, #EAF8EF, #E0F4E8); }
.approval-icon { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
.approval-stage.done .approval-icon { background: #16a34a; color: white; }
.approval-stage.pending .approval-icon { background: #E8EDF3; color: var(--text-3); }
.approval-label { font-size: 12px; font-weight: 700; color: var(--text-1); }
.approval-meta { font-size: 10px; color: var(--text-3); margin-top: 1px; }

.action-section { background: linear-gradient(135deg, #F5F9FD, #ECF4FB); border-radius: 12px; padding: 16px; margin-top: 16px; }
.action-title { font-size: 12px; font-weight: 700; color: var(--main-1); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

.btn { font-family: inherit; padding: 11px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; justify-content: center; width: 100%; }
.btn-primary { background: var(--grad-blue); color: white; box-shadow: 0 4px 12px rgba(0, 103, 172, 0.2); }
.btn-primary:hover { opacity: 0.92; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
.btn-secondary { background: white; color: var(--main-1); border: 1.5px solid var(--main-1); margin-top: 8px; }

.jd-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
.jd-title-area { display: flex; align-items: center; gap: 10px; }
.jd-title-text { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.jd-version { font-size: 11px; color: var(--text-3); }

.jd-content { font-size: 13px; line-height: 1.8; color: var(--text-1); }
.jd-content h3 { font-size: 13px; font-weight: 700; color: var(--main-1); margin: 20px 0 8px; padding-left: 8px; border-left: 3px solid var(--main-1); }
.jd-content h3:first-child { margin-top: 0; }
.jd-content p { margin-bottom: 8px; }
.jd-content ul { padding-left: 18px; margin-bottom: 8px; }
.jd-content li { margin-bottom: 4px; }
.jd-content h2 { font-size: 18px; font-weight: 700; margin-bottom: 14px; color: var(--text-1); }

.empty-jd { text-align: center; padding: 50px 20px; color: var(--text-3); }
.empty-jd i { font-size: 48px; color: var(--text-3); margin-bottom: 14px; display: block; }
.empty-jd .empty-title { font-size: 15px; font-weight: 700; color: var(--text-2); margin-bottom: 6px; }
.empty-jd .empty-desc { font-size: 12px; margin-bottom: 16px; }

.ai-generate-btn { background: var(--grad-blue); color: white; padding: 12px 24px; border: none; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 4px 14px rgba(0, 103, 172, 0.25); }
.ai-generate-btn i { font-size: 16px; }

.generating-overlay { padding: 40px 20px; text-align: center; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--main-1); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.generating-text { font-size: 14px; font-weight: 700; color: var(--main-1); margin-bottom: 6px; }
.generating-sub { font-size: 12px; color: var(--text-3); }

.cursor { display: inline-block; width: 2px; height: 1em; background: var(--main-1); vertical-align: text-bottom; animation: blink 1s infinite; margin-left: 1px; }
@keyframes blink { 50% { opacity: 0; } }

.comment-section { background: linear-gradient(135deg, #FFF8E5, #FFF0CC); border: 1px solid #F0C040; border-radius: 12px; padding: 20px 24px; margin-top: 16px; }
.comment-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: #9A6D00; }
.comment-title i { font-size: 18px; }

.comment-input { width: 100%; padding: 14px 16px; border: 1.5px solid #F0C040; border-radius: 8px; font-family: inherit; font-size: 13px; outline: none; resize: vertical; min-height: 80px; line-height: 1.6; background: white; }
.comment-input:focus { box-shadow: 0 0 0 3px rgba(240, 192, 64, 0.2); }

.comment-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
.comment-hint { font-size: 11px; color: var(--text-2); flex: 1; }
.btn-ai-rewrite { background: var(--grad-blue); color: white; padding: 10px 18px; border: none; border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }

.comment-examples { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.comment-example { background: white; border: 1px solid #F0C040; color: #9A6D00; padding: 5px 12px; border-radius: 14px; font-size: 11px; font-weight: 700; cursor: pointer; }
.comment-example:hover { background: #FFF4D6; }

.review-history { margin-top: 16px; }
.review-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--border); font-size: 12px; }
.review-item:last-child { border-bottom: none; }
.review-icon { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.review-icon.ai { background: linear-gradient(135deg, #E6F1FB, #D5E8F5); color: var(--main-1); }
.review-icon.hr { background: linear-gradient(135deg, #E0F5F7, #C5EBEF); color: var(--sub-3); }
.review-icon.manager { background: linear-gradient(135deg, #FFF4D6, #FCE9B0); color: #9A6D00; }
.review-icon i { font-size: 14px; }
.review-content { flex: 1; }
.review-top { display: flex; gap: 6px; align-items: center; }
.review-actor { font-weight: 700; color: var(--text-1); }
.review-time { font-size: 11px; color: var(--text-3); }
.review-detail { color: var(--text-2); margin-top: 2px; }

.role-banner { background: linear-gradient(135deg, #E6F1FB, #E0F5F7); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-2); }
.role-banner i { color: var(--main-1); font-size: 18px; flex-shrink: 0; }
.role-banner strong { color: var(--main-1); font-weight: 700; }

.action-toggle { background: white; border: 1.5px solid var(--main-1); color: var(--main-1); padding: 14px 16px; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
.action-toggle:hover { background: #F5F9FD; }
.action-toggle.active { background: var(--grad-blue); color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(0, 103, 172, 0.2); }
.action-toggle i { font-size: 16px; }

/* ===== 최종 공고 미리보기 버튼 ===== */
.btn-preview-posting { background: linear-gradient(135deg, #F56A6A, #E84545); color: white; border: none; padding: 6px 14px; font-size: 11px; font-weight: 700; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; box-shadow: 0 3px 10px rgba(232, 69, 69, 0.25); transition: all 0.15s; }
.btn-preview-posting:hover { opacity: 0.92; transform: translateY(-1px); }
.btn-preview-posting i { font-size: 14px; }

/* ===== 공고 미리보기 모달 ===== */
.posting-backdrop { position: fixed; inset: 0; background: rgba(15, 35, 65, 0.55); z-index: 2000; display: none; align-items: flex-start; justify-content: center; padding: 32px 20px; overflow-y: auto; }
.posting-backdrop.show { display: flex; }
.posting-modal { background: white; border-radius: 14px; width: 100%; max-width: 920px; box-shadow: 0 24px 70px rgba(0, 0, 0, 0.3); overflow: hidden; margin: auto; animation: postingPop 0.25s ease; }
@keyframes postingPop { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.posting-modal-bar { background: var(--text-1); color: white; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 5; }
.posting-modal-bar-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
.posting-modal-bar-title i { font-size: 16px; }
.posting-modal-bar-title span { font-weight: 400; color: rgba(255,255,255,0.6); font-size: 11px; }
.posting-modal-bar-actions { display: flex; align-items: center; gap: 8px; }
.posting-bar-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 12px; border-radius: 6px; font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
.posting-bar-btn:hover { background: rgba(255,255,255,0.25); }
.posting-bar-close { background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.posting-bar-close:hover { background: rgba(255,255,255,0.15); color: white; }
.posting-scroll { max-height: calc(100vh - 130px); overflow-y: auto; padding: 36px 44px 48px; }

/* 공고 본문 (ABL 톤) */
.pt-title { font-size: 22px; font-weight: 700; color: #222; letter-spacing: -0.4px; padding-bottom: 16px; border-bottom: 2px solid #eee; margin-bottom: 24px; }
.pt-title .abl-red { color: #E84545; }

/* 히어로 배너 */
.pt-hero { border-radius: 14px; overflow: hidden; background: linear-gradient(120deg, #F08080 0%, #E84545 55%, #D63838 100%); padding: 44px 40px; position: relative; margin-bottom: 36px; min-height: 230px; }
.pt-hero::after { content: ''; position: absolute; top: -30px; right: 60px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.07); }
.pt-hero::before { content: ''; position: absolute; bottom: -40px; right: 180px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.06); }
.pt-hero-eyebrow { font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 400; margin-bottom: 18px; letter-spacing: 0.3px; position: relative; z-index: 2; }
.pt-hero-title { font-size: 30px; font-weight: 700; color: white; line-height: 1.32; letter-spacing: -0.5px; position: relative; z-index: 2; text-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.pt-hero-sub { font-size: 13px; color: rgba(255,255,255,0.9); font-weight: 700; margin-top: 18px; position: relative; z-index: 2; }
.pt-hero-logo { position: absolute; top: 36px; right: 40px; font-size: 32px; font-weight: 800; color: white; font-style: italic; letter-spacing: -1px; z-index: 2; }
.pt-hero-emoji { position: absolute; right: 44px; bottom: 36px; font-size: 60px; z-index: 1; opacity: 0.92; }

/* 섹션 제목 */
.pt-section-title { font-size: 20px; font-weight: 700; color: #E84545; margin: 36px 0 16px; letter-spacing: -0.3px; }
.pt-section-title:first-child { margin-top: 0; }
.pt-edit-deadline-btn { font-size: 11px; font-weight: 700; color: var(--main-1); background: var(--info-bg, #E6F1FB); border: 1px solid var(--main-1); padding: 4px 10px; border-radius: 6px; cursor: pointer; margin-left: 10px; vertical-align: middle; display: inline-flex; align-items: center; gap: 4px; }
.pt-edit-deadline-btn:hover { background: var(--main-1); color: white; }
.pt-edit-deadline-btn i { font-size: 12px; }

/* 모집 테이블 */
.pt-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.pt-table th { background: #F56A6A; color: white; font-weight: 700; padding: 12px 8px; text-align: center; border: 1px solid #fff; font-size: 12px; }
.pt-table td { border: 1px solid #e5e5e5; padding: 14px 12px; vertical-align: top; color: #333; line-height: 1.7; }
.pt-table td.center { text-align: center; vertical-align: middle; white-space: nowrap; }
.pt-table .qual-head { font-weight: 700; color: #222; margin: 0 0 4px; }
.pt-table .qual-head:not(:first-child) { margin-top: 12px; }
.pt-table ul { list-style: none; padding: 0; margin: 0; }
.pt-table li { padding-left: 12px; position: relative; margin-bottom: 5px; }
.pt-table li::before { content: '-'; position: absolute; left: 0; color: #888; }

/* 전형절차 */
.pt-process { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; margin: 20px 0 8px; }
.pt-process-step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.pt-process-circle { width: 92px; height: 92px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #F89999, #E84545); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(232,69,69,0.3); }
.pt-process-num { font-size: 11px; opacity: 0.7; font-weight: 700; }
.pt-process-label { font-size: 12px; font-weight: 700; margin-top: 2px; }

/* 리스트 섹션 */
.pt-list { list-style: none; padding: 0; margin: 0; }
.pt-list li { position: relative; padding-left: 16px; margin-bottom: 8px; font-size: 13px; color: #444; line-height: 1.7; }
.pt-list li::before { content: '•'; position: absolute; left: 2px; color: #E84545; font-weight: 700; }
.pt-list .hl-red { color: #E84545; font-weight: 700; }

/* 유의사항 핑크박스 */

.pt-notice-box .pt-section-title { margin-top: 0; }

.pt-info-block { margin-bottom: 28px; }

/* ===== [3번] AI 재작성 전/후 비교 카드 ===== */
.diff-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; transition: all 0.2s; }
.diff-card.decided-accept { border-color: #16a34a; background: linear-gradient(135deg, #FAFFFB, #F0FAF3); }
.diff-card.decided-reject { border-color: var(--border); background: #FAFAFA; opacity: 0.7; }
.diff-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.diff-section-label { font-size: 13px; font-weight: 700; color: var(--text-1); display: flex; align-items: center; gap: 6px; }
.diff-section-label i { color: var(--main-1); font-size: 15px; }
.diff-decision-badge { font-size: 11px; font-weight: 700; }
.db-accept { color: #16a34a; display: inline-flex; align-items: center; gap: 3px; }
.db-reject { color: var(--text-3); display: inline-flex; align-items: center; gap: 3px; }
.diff-cols { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: stretch; }
.diff-col { border-radius: 8px; padding: 12px; font-size: 12px; line-height: 1.6; }
.diff-before { background: #FFF5F5; border: 1px solid #FAD4D4; }
.diff-after { background: #F0F7FF; border: 1px solid #C5DEF5; }
.diff-col-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 8px; }
.diff-before .diff-col-label { color: #C0392B; }
.diff-after .diff-col-label { color: var(--main-1); }
.diff-col-body { color: var(--text-1); }
.diff-arrow { display: flex; align-items: center; color: var(--main-1); font-size: 18px; }
.diff-actions { display: flex; gap: 8px; margin-top: 12px; }
.diff-btn { flex: 1; padding: 8px; border-radius: 6px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 4px; border: 1px solid var(--border); background: white; transition: all 0.15s; }
.diff-reject { color: var(--text-2); }
.diff-reject:hover { background: #FFF5F5; border-color: #E74C3C; color: #C0392B; }
.diff-accept { color: var(--main-1); border-color: var(--main-1); }
.diff-accept:hover { background: var(--main-1); color: white; }
@media (max-width: 720px) {
  .diff-cols { grid-template-columns: 1fr; }
  .diff-arrow { transform: rotate(90deg); justify-content: center; padding: 4px 0; }
}
</style>

<script>
const empId = sessionStorage.getItem('empId');
const role = sessionStorage.getItem('role') || (empId && empId.startsWith('2') ? 'manager' : 'hr');
if (!empId) window.location.href = '../../index.html';
document.getElementById('userId').textContent = '사번 ' + empId;

const STEPS = [
  { name: '요청서 작성', actor: '현업' },
  { name: 'JD 작성·검토 요청', actor: 'AI + HR' },
  { name: '현업 검토', actor: '현업' },
  { name: '공고 등재', actor: 'HR' }
];

function renderNav() {
  const isHR = role === 'hr';
  const items = isHR ? [
    { href: '../../dashboard-hr.html', icon: 'ti-layout-dashboard', label: '대시보드', section: '메인' },
    { href: 'index.html', icon: 'ti-clipboard-text', label: 'JD 작성', section: '채용 업무', active: true },
    { href: '../resume-analysis/index.html', icon: 'ti-file-search', label: '자소서 분석', section: '채용 업무' },
    { href: '../schedule/index.html', icon: 'ti-calendar-event', label: '면접 일정', section: '채용 업무' },
    { href: '../interview/index.html', icon: 'ti-microphone-2', label: '면접 진행', section: '채용 업무' },
    { href: '../report/index.html', icon: 'ti-chart-histogram', label: '채용 리포트', section: '채용 업무' }
  ] : [
    { href: '../../dashboard-manager.html', icon: 'ti-layout-dashboard', label: '대시보드', section: '메인' },
    { href: 'index.html', icon: 'ti-clipboard-text', label: '채용 니즈 입력', section: '참여 업무', active: true },
    { href: '../resume-analysis/index.html', icon: 'ti-file-search', label: '서류 평가', section: '참여 업무' },
    { href: '../interview/index.html', icon: 'ti-microphone-2', label: '면접 지원', section: '참여 업무' }
  ];

  const nav = document.getElementById('navMenu');
  let html = '';
  let lastSection = '';
  items.forEach(it => {
    if (it.section !== lastSection) { html += `<div class="nav-section-title">${it.section}</div>`; lastSection = it.section; }
    html += `<a class="nav-item ${it.active ? 'active' : ''}" href="${it.href}"><i class="ti ${it.icon}"></i> <span class="label">${it.label}</span></a>`;
  });
  nav.innerHTML = html;

  document.getElementById('brandLink').href = isHR ? '../../dashboard-hr.html' : '../../dashboard-manager.html';
  const badge = document.getElementById('userBadge');
  if (isHR) badge.innerHTML = '<i class="ti ti-user"></i> HR 담당자';
  else { badge.classList.add('manager-role'); badge.innerHTML = '<i class="ti ti-user-check"></i> 현업 리더'; }
}

function renderStepper(currentStep) {
  let html = '<div class="stepper-row">';
  STEPS.forEach((s, i) => {
    const stepNum = i + 1;
    let state = 'pending';
    if (stepNum < currentStep) state = 'done';
    else if (stepNum === currentStep) state = 'current';
    const icon = state === 'done' ? '<i class="ti ti-check"></i>' : stepNum;
    html += `<div class="step ${state}"><div class="step-circle ${state}">${icon}</div><div class="step-text"><div class="step-name">${s.name}</div><div class="step-status">${s.actor}</div></div></div>`;
    if (i < STEPS.length - 1) {
      const lineClass = stepNum < currentStep ? 'done' : '';
      html += `<div class="step-line ${lineClass}"></div>`;
    }
  });
  html += '</div>';
  return `<div class="stepper">${html}</div>`;
}

function renderRequestPanel(req, approvalStatus) {
  // 요구자격 6개 항목 정의 (빈 항목은 자동 숨김)
  const qualItems = [
    { key: 'qual_technical', label: 'Technical Knowledge', ko: '기술 지식' },
    { key: 'qual_education', label: 'Educational Background', ko: '학력' },
    { key: 'qual_experience', label: 'Job Experience', ko: '경력' },
    { key: 'qual_language', label: 'Language Skill', ko: '어학' },
    { key: 'qual_certification', label: 'Certification', ko: '자격증' },
    { key: 'qual_competencies', label: 'Competencies', ko: '역량' }
  ];
  const qualRows = qualItems
    .filter(q => req[q.key] && req[q.key].trim())
    .map(q => `
      <div class="qual-item">
        <div class="qual-item-label">${q.label} <span class="qual-item-ko">${q.ko}</span></div>
        <div class="qual-item-value">${req[q.key]}</div>
      </div>`).join('');

  // 충원 사유
  const reasonBlock = (req.reason_category || req.reason_detail) ? `
    <div class="req-block">
      <div class="req-label">충원 사유 (Reason)</div>
      ${req.reason_category ? `<div class="req-value"><span class="req-tag value-tag" style="margin-bottom:6px;display:inline-block;">${req.reason_category}</span></div>` : ''}
      ${req.reason_detail ? `<div class="req-value" style="margin-top:4px;">${req.reason_detail}</div>` : ''}
    </div>` : '';

  // 승인 상태 (있을 때만)
  let approvalBlock = '';
  if (approvalStatus) {
    const stages = [
      { key: 'requester', label: '요청 부서장', en: 'Requested by Head of Dept.' },
      { key: 'hr_consent', label: '인사팀 검토', en: 'HR Consent' },
      { key: 'approved', label: '본부장 승인', en: 'Approved by Head of Office' }
    ];
    const stageRows = stages.map(s => {
      const st = approvalStatus[s.key] || {};
      const done = st.approved;
      return `
        <div class="approval-stage ${done ? 'done' : 'pending'}">
          <div class="approval-icon">${done ? '<i class="ti ti-check"></i>' : '<i class="ti ti-clock"></i>'}</div>
          <div class="approval-info">
            <div class="approval-label">${s.label}</div>
            <div class="approval-meta">${done ? (st.by + ' · ' + (st.at ? st.at.slice(0,10) : '')) : '대기 중'}</div>
          </div>
        </div>`;
    }).join('');
    approvalBlock = `
      <div class="req-block" style="margin-top:18px; padding-top:16px; border-top:1px dashed var(--border);">
        <div class="req-label">승인 절차 (Approval)</div>
        <div class="approval-flow">${stageRows}</div>
      </div>`;
  }

  return `
    <div class="panel">
      <div class="panel-title"><i class="ti ti-clipboard-text"></i> 직원충원요청서 <span style="font-size:11px; font-weight:400; color:var(--text-3); margin-left:auto;">Personnel Request Form</span></div>

      <div class="req-block">
        <div class="req-label">본부 · 팀 (Office · Dept.)</div>
        <div class="req-value"><strong>${req.office || '-'}</strong> · ${req.dept || '-'}</div>
      </div>
      <div class="req-block">
        <div class="req-label">채용 직무 (Job Position)</div>
        <div class="req-value"><strong>${req.position}</strong></div>
      </div>
      <div class="req-block">
        <div class="req-label">기본 정보</div>
        <div class="req-value">${req.type} · ${req.level}급 · ${req.headcount}명 모집${req.employment_type ? ' · <strong>' + req.employment_type + '</strong>' : ''}</div>
      </div>
      ${req.desired_date ? `<div class="req-block"><div class="req-label">입사 요청일 (Required Date)</div><div class="req-value">${req.desired_date}</div></div>` : ''}

      ${reasonBlock}

      <div class="req-block">
        <div class="req-label">주요업무 (Job Description)</div>
        <div class="req-value">${req.main_duties}</div>
      </div>

      ${qualRows ? `<div class="req-block">
        <div class="req-label">요구자격 (Required Qualifications)</div>
        <div class="qual-list">${qualRows}</div>
      </div>` : ''}

      ${req.core_values && req.core_values.length ? `<div class="req-block"><div class="req-label">ABL 우선 핵심가치</div><div class="req-tags">${req.core_values.map(v => `<span class="req-tag value-tag">${v}</span>`).join('')}</div></div>` : ''}
      ${req.key_skills && req.key_skills.length ? `<div class="req-block"><div class="req-label">핵심 우대 역량</div><div class="req-tags">${req.key_skills.map(s => `<span class="req-tag">${s}</span>`).join('')}</div></div>` : ''}
      ${req.preferred_qual ? `<div class="req-block"><div class="req-label">기타 우대사항</div><div class="req-value">${req.preferred_qual}</div></div>` : ''}
      ${req.etc ? `<div class="req-block"><div class="req-label">기타 요구사항</div><div class="req-value">${req.etc}</div></div>` : ''}

      <div class="req-block">
        <div class="req-label">작성자</div>
        <div class="req-value" style="font-size:12px; color: var(--text-2);">${req.creator} · ${req.created_at}</div>
      </div>

      ${approvalBlock}
    </div>
  `;
}

function renderJDPanel(data) {
  const jd = data.jd_draft;
  const isHR = role === 'hr';
  // 현업이 이미 수정 의견을 보냈는지 여부
  const alreadySent = !!localStorage.getItem('pendingFeedback-' + data.id);

  if (!jd) {
    return `
      <div class="panel">
        <div class="empty-jd">
          <i class="ti ti-file-text"></i>
          <div class="empty-title">JD 초안이 아직 생성되지 않았습니다</div>
          <div class="empty-desc">${isHR ? '아래 버튼을 클릭하면 AI가 충원요청서를 분석하여 JD 초안을 자동 생성합니다.' : '인사팀이 JD 초안을 생성하면 검토 요청이 도착합니다.'}</div>
          ${isHR ? '<button class="ai-generate-btn" onclick="startAIGenerate()"><i class="ti ti-sparkles"></i> AI로 JD 초안 생성</button>' : ''}
        </div>
      </div>
    `;
  }

  return `
    <div class="panel">
      <div class="jd-header">
        <div class="jd-title-area">
          <div class="jd-title-text"><i class="ti ti-file-text" style="color: var(--main-1);"></i> JD 초안</div>
          <span class="jd-version">v${jd.version} · ${jd.last_updated}</span>
        </div>
        <div style="display:flex; gap:6px;">
          <button class="btn-preview-posting" onclick="openPostingPreview()"><i class="ti ti-eye"></i> 최종 공고 미리보기</button>
          ${isHR ? '<span id="jdEditBtnArea"><button class="btn" id="btnJDEdit" style="background:white; color:var(--text-2); border:1px solid var(--border); padding:6px 12px; font-size:11px; width:auto;" onclick="toggleJDEdit()"><i class="ti ti-edit" style="font-size:13px;"></i> 직접 수정</button></span>' : ''}
        </div>
      </div>

      <div class="jd-content" id="jdContent">
        <h2>${jd.title}</h2>
        <h3>주요 업무</h3>
        <ul>${jd.main_duties.map(d => `<li>${d}</li>`).join('')}</ul>
        <h3>자격요건 (필수)</h3>
        <ul>${jd.required.map(r => `<li>${r}</li>`).join('')}</ul>
        <h3>우대 사항</h3>
        <ul>${jd.preferred.map(p => `<li>${p}</li>`).join('')}</ul>
        <h3>근무 조건</h3>
        <p><strong>고용 형태:</strong> ${jd.employment_type}<br>
        <strong>근무 위치:</strong> ${jd.location}<br>
        <strong>처우:</strong> ${jd.salary}<br>
        <strong>복리후생:</strong> ${jd.benefits}</p>
        <h3>회사 소개</h3>
        <p>${jd.company_intro}</p>
        <h3>이런 분을 찾고 있어요</h3>
        <p>${jd.role_summary}</p>
        <h3>인재상</h3>
        <p>${jd.talent_profile}</p>
      </div>
      <!--END-JD-CONTENT-->

      ${isHR && data.current_step === 2 ? `
        <div class="action-section">
          <div class="action-title"><i class="ti ti-send"></i> 다음 단계</div>
          <button class="btn btn-primary" onclick="requestReview()"><i class="ti ti-mail"></i> 현업에게 검토 요청 보내기</button>
        </div>
      ` : ''}

      ${!isHR && data.current_step === 3 && !alreadySent ? `
        <div style="background: linear-gradient(135deg, #F5F9FD, #ECF4FB); border: 1px solid var(--main-1); border-radius: 12px; padding: 20px 24px; margin-top: 20px;">
          <div style="font-size: 14px; font-weight: 700; margin-bottom: 6px; color: var(--main-1); display: flex; align-items: center; gap: 8px;">
            <i class="ti ti-help-circle" style="font-size: 18px;"></i> 인사팀이 작성한 JD를 검토해주세요
          </div>
          <p style="font-size: 12px; color: var(--text-2); margin-bottom: 16px; line-height: 1.6;">
            JD 내용을 확인하셨나요? <strong style="color: var(--main-1);">수정할 부분이 없으면</strong> 바로 공고 등재를 요청하시고,
            <strong style="color: var(--main-1);">고치고 싶은 부분이 있으면</strong> 수정 의견을 남겨주세요. AI가 인사팀에 전달하기 좋게 정리해드립니다.
          </p>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button id="btnRevise" onclick="selectAction('revise')" class="action-toggle">
              <i class="ti ti-edit"></i> 수정 의견이 있어요
            </button>
            <button id="btnPublish" onclick="selectAction('publish')" class="action-toggle">
              <i class="ti ti-check"></i> 수정 없이 등재할게요
            </button>
          </div>
        </div>

        <div id="reviseArea" style="display: none;">
          <div class="comment-section" id="commentSection" style="margin-top: 16px;">
            <div class="comment-title"><i class="ti ti-edit"></i> 수정 의견 작성</div>
            <p style="font-size: 12px; color: var(--text-2); margin-bottom: 10px;">수정이 필요한 부분을 자유롭게 작성해주세요. 단답형으로 적으셔도 AI가 인사팀에 전달하기 좋은 정제된 문장으로 다듬어드립니다.</p>
            <textarea class="comment-input" id="commentInput" placeholder="예: 담당 업무 더 구체적으로, 신규사업 영역 추가, GA4 외 다른 분석 도구도 언급, '스마트' 가치 강조"></textarea>
            <div class="comment-actions">
              <span class="comment-hint">AI가 인사팀이 이해하기 쉽게 정제해드립니다</span>
              <button class="btn-ai-rewrite" onclick="refineComment()"><i class="ti ti-sparkles"></i> AI로 의견 정제</button>
            </div>

            <div id="refinedBox" style="display: none; margin-top: 16px; padding: 16px; background: white; border: 1px solid var(--main-1); border-radius: 8px;">
              <div style="font-size: 12px; font-weight: 700; color: var(--main-1); margin-bottom: 8px; display: flex; align-items: center; gap: 6px;"><i class="ti ti-sparkles"></i> AI가 정제한 의견</div>
              <div id="refinedContent" style="font-size: 13px; line-height: 1.7; color: var(--text-1); white-space: pre-wrap;"></div>

// 목록(index.html)에 진행 상태를 반영하기 위해 localStorage에 저장 (로그인 전환에도 유지)
function saveReqState(id, patch) {
  try {
    const prev = localStorage.getItem('reqState-' + id);
    const merged = prev ? { ...JSON.parse(prev), ...patch } : patch;
    localStorage.setItem('reqState-' + id, JSON.stringify(merged));
  } catch (e) { console.warn('saveReqState 오류', e); }
}

function selectAction(action) {
  const btnR = document.getElementById('btnRevise');
  const btnP = document.getElementById('btnPublish');
  const areaR = document.getElementById('reviseArea');
  const areaP = document.getElementById('publishArea');

  btnR.classList.remove('active');
  btnP.classList.remove('active');
  if (areaR) areaR.style.display = 'none';
  if (areaP) areaP.style.display = 'none';

  if (action === 'revise') {
    btnR.classList.add('active');
    areaR.style.display = 'block';
    setTimeout(() => {
      areaR.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.getElementById('commentInput').focus();
    }, 100);
  } else {
    btnP.classList.add('active');
    areaP.style.display = 'block';
    setTimeout(() => areaP.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }
}

function refineComment() {
  const raw = document.getElementById('commentInput').value.trim();
  if (!raw) {
    alert('수정 의견을 입력해주세요.');
    return;
  }

  const box = document.getElementById('refinedBox');
  const content = document.getElementById('refinedContent');
  box.style.display = 'block';
  content.textContent = '';

  const refined = generateRefinedComment(raw);

  let i = 0;
  const typing = setInterval(() => {
    if (i < refined.length) {
      content.textContent += refined[i];
      i++;
    } else {
      clearInterval(typing);
    }
  }, 18);
}

function generateRefinedComment(raw) {
  const points = [];
  const lower = raw.toLowerCase();

  if (raw.includes('담당') || raw.includes('업무') || raw.includes('구체')) {
    points.push('• 주요 업무 항목을 보다 구체화하여 작성 부탁드립니다. 현재 항목들이 다소 추상적으로 느껴지며, 신규 사업 영역 책임과 일상 운영 업무를 구분하여 명시해주시면 좋겠습니다.');
  }
  if (raw.includes('GA4') || raw.includes('분석') || raw.includes('도구') || raw.includes('tableau') || raw.includes('looker')) {
    points.push('• 필수 자격요건의 데이터 분석 도구 항목에 GA4 외에도 Tableau, Looker 등 BI 도구 활용 경험을 추가 명시 부탁드립니다.');
  }
  if (raw.includes('스마트') || raw.includes('가치')) {
    points.push("• 인재상 섹션에서 ABL의 '스마트' 핵심가치를 보다 강조하여, 데이터 기반의 실험적 사고와 빠른 학습력을 갖춘 인재임을 명확히 드러내주시기 바랍니다.");
  }
  if (raw.includes('자격') || raw.includes('엄격') || raw.includes('경력')) {
    points.push('• 필수 자격요건의 경력 기준을 현재 3년에서 5년 이상으로 상향 조정 부탁드립니다. 실무 깊이가 중요한 포지션입니다.');
  }
  if (raw.includes('신규사업') || raw.includes('신규 사업') || raw.includes('사업')) {
    points.push('• 직무 소개 및 주요 업무에 신규 사업(디지털 마케팅 채널 확장) 추진 책임을 명시적으로 추가해주시면 좋겠습니다.');
  }
  if (raw.includes('자동화') || raw.includes('braze') || raw.includes('marketo')) {
    points.push('• 우대사항이 아닌 필수 자격요건으로 마케팅 자동화 툴 운영 경험을 격상 부탁드립니다.');
  }

  if (points.length === 0) {
    points.push(`• ${raw.split(/[,，·]/)[0].trim()}: 해당 부분에 대한 수정 또는 보완을 부탁드립니다.`);
    if (raw.split(/[,，·]/).length > 1) {
      raw.split(/[,，·]/).slice(1).forEach(p => {
        if (p.trim()) points.push(`• ${p.trim()}: 추가 검토 부탁드립니다.`);
      });
    }
  }

  return `안녕하세요, 인사팀.

JD 검토 후 아래와 같이 수정 의견 전달드립니다:

${points.join('\n\n')}

마케팅팀 김부장 드림`;
}

function sendRefinedComment() {
  if (!confirm('정제된 의견을 인사팀에 전송하시겠습니까?')) return;

  const refined = document.getElementById('refinedContent').textContent;
  const rawComment = document.getElementById('commentInput').value.trim();
  currentData.review_history.push({
    actor: "마케팅팀 김부장",
    actor_role: "manager",
    timestamp: new Date().toISOString().slice(0, 16).replace('T', ' '),
    action: "수정 의견 전송",
    detail: refined.split('\n')[0] + " (AI 정제됨)"
  });

  // 목록 상태 반영 + HR이 재작성할 수 있도록 수정의견 저장

  render(currentData);
}

// ===== [3번] HR: AI 재작성 (현업 의견 → 제안 → 전/후 비교 → 선택) =====
let rewriteProposals = [];

// 현업 의견을 분석해 어떤 섹션을 어떻게 바꿀지 "제안" 생성
function buildRewriteProposals(comment, jd) {
  const proposals = [];
  const c = comment;

  if (c.includes('스마트') || c.includes('인재상') || c.includes('가치')) {
    proposals.push({
      key: 'talent_profile', label: '인재상', type: 'text',
      before: jd.talent_profile,
      after: "특히 '스마트' 가치를 최우선으로 봅니다. 빠른 학습력과 실험적 사고를 가진 분, 가설을 세우고 데이터로 검증하는 과정을 즐기는 분, 기존 마케팅 방식에 도전적으로 접근하는 분을 찾습니다."
    });
  }
  if (c.includes('구체') || c.includes('업무') || c.includes('상세')) {
    proposals.push({
      key: 'main_duties', label: '주요 업무', type: 'list',
      before: jd.main_duties,
      after: [
        "디지털 마케팅 캠페인 통합 운영 (검색·디스플레이·SNS·CRM 전 채널)",
        "GA4 및 Tableau 기반 사용자 행동 분석 및 LTV/CAC 모니터링",
        "주 단위 A/B 테스트 설계·실행 (월 4건 이상 목표)",
        "Braze 기반 마케팅 자동화 시나리오 설계 및 30+ 트리거 운영",
        "신규 디지털 채널 발굴 및 PoC 추진 (분기 1건 이상)",
        "예산 관리 및 ROI 리포팅 (월간 경영진 보고)"
      ]
    });
  }
  if (c.includes('엄격') || c.includes('자격') || c.includes('경력') || c.includes('높')) {
    proposals.push({
      key: 'required', label: '자격요건 (필수)', type: 'list',
      before: jd.required,
      after: [
        "디지털 마케팅 직무 5년 이상의 실무 경력 (B2C 우대)",
        "Google Analytics 4 (GA4) 전문가 수준 활용",
        "A/B 테스트 설계·실행 50건 이상 경험",
        "SQL 중급 이상 (조인, 윈도우 함수 활용 가능)",
        "정량적 성과 입증 가능한 프로젝트 3건 이상"
      ]
    });
  }
  if (c.includes('복지') || c.includes('처우') || c.includes('연봉') || c.includes('보상')) {
    proposals.push({
      key: 'benefits', label: '복리후생', type: 'text',
      before: jd.benefits,
      after: "4대 보험, 퇴직연금, 성과급, 학자금 지원, 종합검진, 콘도미니엄, 복지카드, 동호회 지원, 자기계발비 지원, 유연근무제"
    });
  }

  // 매칭된 게 없으면 회사소개/직무요약을 일반 보정
  if (proposals.length === 0) {
    proposals.push({
      key: 'role_summary', label: '직무 요약', type: 'text',
      before: jd.role_summary,
      after: jd.role_summary + " (현업 의견 반영: " + comment.substring(0, 40) + (comment.length > 40 ? '…' : '') + ")"
    });
  }
  return proposals;
}

    return `<div>${v}</div>`;
  };

  let cards = rewriteProposals.map((p, i) => `
    <div class="diff-card" id="diffCard-${i}" data-decision="pending">
      <div class="diff-card-head">
        <div class="diff-section-label"><i class="ti ti-pencil"></i> ${p.label}</div>

      </div>
    </div>
  `).join('');

  diffArea.innerHTML = `
    <div class="action-section" style="border:1px solid var(--main-1);">
      <div class="action-title"><i class="ti ti-git-compare"></i> AI 수정 제안 · 전/후 비교</div>
      <p style="font-size:12px; color:var(--text-2); line-height:1.7; margin-bottom:16px;">

        <button class="btn" style="flex:1; background:white; border:1px solid var(--main-1); color:var(--main-1);" onclick="applyAllDiff('accept')">전체 반영</button>
        <button class="btn btn-primary" style="flex:2;" onclick="finalizeRewrite()"><i class="ti ti-check"></i> 선택 내용으로 JD 재생성</button>

  setTimeout(() => document.getElementById('rewriteDiffArea').scrollIntoView({behavior:'smooth', block:'start'}), 100);

function decideDiff(i, decision) {
  const card = document.getElementById('diffCard-' + i);
  const badge = document.getElementById('diffBadge-' + i);
  card.dataset.decision = decision;
  card.classList.remove('decided-accept', 'decided-reject');
  card.classList.add(decision === 'accept' ? 'decided-accept' : 'decided-reject');
  badge.innerHTML = decision === 'accept'
    ? '<span class="db-accept"><i class="ti ti-check"></i> 반영함</span>'
    : '<span class="db-reject"><i class="ti ti-x"></i> 거부함</span>';
}

function applyAllDiff(decision) {
  rewriteProposals.forEach((p, i) => decideDiff(i, decision));
}

function finalizeRewrite() {
  // 미선택 항목 체크
  const pending = rewriteProposals.filter((p, i) => document.getElementById('diffCard-' + i).dataset.decision === 'pending');
  if (pending.length > 0) {
    if (!confirm('아직 선택하지 않은 항목이 ' + pending.length + '개 있습니다.\n미선택 항목은 "거부(현재 유지)"로 처리됩니다. 계속할까요?')) return;
  }

  let appliedCount = 0;
  rewriteProposals.forEach((p, i) => {
    const decision = document.getElementById('diffCard-' + i).dataset.decision;
    if (decision === 'accept') {
      currentData.jd_draft[p.key] = p.after;
      appliedCount++;
    }
  });

  currentData.jd_draft.version = (currentData.jd_draft.version || 1) + 1;
  currentData.jd_draft.last_updated = new Date().toISOString().slice(0, 16).replace('T', ' ');
  currentData.jd_draft._editedHTML = null; // 직접수정 HTML 캐시 무효화

  currentData.review_history.push({
    actor: "AI",
    actor_role: "ai",
    timestamp: new Date().toISOString().slice(0, 16).replace('T', ' '),
    action: "현업 의견 반영 재작성",
    detail: `현업 수정 의견을 분석하여 ${rewriteProposals.length}개 항목 제안 중 ${appliedCount}개를 반영해 v${currentData.jd_draft.version}으로 재생성했습니다.`
  });

  // 현업 의견 처리 완료 → step 2(검토요청 전)로 되돌려 HR이 재검토 요청 가능하게

  alert(`JD가 재생성되었습니다. (${appliedCount}개 항목 반영)\n\n수정된 JD를 다시 현업에 검토 요청하거나, 바로 공고 등재를 진행할 수 있습니다.`);
  render(currentData);
}

// 수정된 JD 본문(HTML)에서 섹션별 내용을 추출해 jd_draft에 반영
function parseEditedJD(contentEl, jd) {
  try {
    const nodes = Array.from(contentEl.children);
    let currentSection = null;
    const buckets = {}; // 섹션명 → {paras:[], items:[]}
    let title = jd.title;

    nodes.forEach(node => {
      const tag = node.tagName ? node.tagName.toLowerCase() : '';
      if (tag === 'h2') {
        title = node.textContent.trim() || title;
      } else if (tag === 'h3') {
        currentSection = node.textContent.trim();
        buckets[currentSection] = { paras: [], items: [] };
      } else if (tag === 'ul' && currentSection) {
        Array.from(node.querySelectorAll('li')).forEach(li => {
          const t = li.textContent.trim();
          if (t) buckets[currentSection].items.push(t);
        });
      } else if (tag === 'p' && currentSection) {
        const t = node.textContent.trim();
        if (t) buckets[currentSection].paras.push(t);
      }
    });

    jd.title = title;
    // 섹션 이름 매칭 (부분 일치)
    const findBucket = (keywords) => {
      for (const key in buckets) {
        if (keywords.some(kw => key.includes(kw))) return buckets[key];
      }
      return null;
    };

    const duties = findBucket(['주요 업무', '주요업무']);
    if (duties && duties.items.length) jd.main_duties = duties.items;

    const required = findBucket(['자격요건', '필수']);
    if (required && required.items.length) jd.required = required.items;

    const preferred = findBucket(['우대']);
    if (preferred && preferred.items.length) jd.preferred = preferred.items;

    const company = findBucket(['회사 소개', '회사소개']);
    if (company && company.paras.length) jd.company_intro = company.paras.join(' ');

    const role = findBucket(['찾고', '이런 분']);
    if (role && role.paras.length) jd.role_summary = role.paras.join(' ');

    const talent = findBucket(['인재상']);
    if (talent && talent.paras.length) jd.talent_profile = talent.paras.join(' ');
  } catch (err) {
    console.warn('JD 파싱 중 오류 (무시):', err);
  }
}

function cancelJDEdit() {
  const content = document.getElementById('jdContent');
  if (!content) return;

  content.contentEditable = 'false';
  content.style.border = '';
  content.style.borderRadius = '';
  content.style.padding = '';
  content.style.background = '';
  content.style.boxShadow = '';
  const guide = document.getElementById('jdEditGuide');
  if (guide) guide.remove();
  // 버튼 원복 (jdEditBtnArea만)
  const btnArea3 = document.getElementById('jdEditBtnArea');
  if (btnArea3) {
    btnArea3.innerHTML = `<button class="btn" id="btnJDEdit" style="background:white; color:var(--text-2); border:1px solid var(--border); padding:6px 12px; font-size:11px; width:auto;" onclick="toggleJDEdit()"><i class="ti ti-edit" style="font-size:13px;"></i> 직접 수정</button>`;
  }
  jdEditOriginal = '';
}

function showJDToast(msg) {
  let t = document.getElementById('jdToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'jdToast';
    t.style.cssText = 'position:fixed; left:50%; bottom:26px; transform:translate(-50%,20px); padding:12px 18px; border-radius:999px; color:white; background:rgba(15,35,65,0.92); font-size:13px; font-weight:700; opacity:0; pointer-events:none; transition:0.2s; z-index:9999; box-shadow:0 8px 24px rgba(0,0,0,0.18); display:flex; align-items:center; gap:8px;';
    document.body.appendChild(t);
  }
  t.innerHTML = '<i class="ti ti-check" style="font-size:15px; color:#4ade80;"></i>' + msg;
  t.style.opacity = '1'; t.style.transform = 'translate(-50%,0)';
  clearTimeout(showJDToast._t);
  showJDToast._t = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%,20px)'; }, 2000);
}

function logout() { sessionStorage.clear(); window.location.href = '../../index.html'; }

// ===== 최종 채용공고 미리보기 =====
function openPostingPreview() {
  const data = currentData;
  const jd = data && data.jd_draft;
  const req = data && data.request;
  if (!jd) { alert('먼저 JD 초안을 생성해주세요.'); return; }

  // 요구자격 6개 → 필수사항 리스트로 (req 우선, 없으면 jd.required)
  const reqQuals = [];
  if (req) {
    const qmap = [
      ['qual_technical', ''], ['qual_education', ''], ['qual_experience', ''],
      ['qual_language', ''], ['qual_certification', ''], ['qual_competencies', '']
    ];
    qmap.forEach(([k]) => {
      if (req[k] && req[k].trim()) {
        req[k].split('\n').forEach(line => {
          const t = line.replace(/^[·\-•*\s]+/, '').trim();
          if (t) reqQuals.push(t);
        });
      }
    });
  }
  const requiredList = reqQuals.length ? reqQuals : (jd.required || []);
  const preferredList = jd.preferred || [];
  const dutiesList = jd.main_duties || [];

  // 채용 형태 / 근무 형태
  const recruitType = req ? req.type : '경력';
  const empType = jd.employment_type || (req && req.employment_type) || '정규직';
  const office = req ? (req.office || req.dept) : '마케팅본부';
  const dept = req ? req.dept : '마케팅팀';
  const position = jd.title || (req && req.position) || '디지털 마케팅 매니저';

  // 히어로 타이틀 (회사명 + 팀 + 채용)
  const heroTitle = `에이비엘생명보험<br>${dept} ${recruitType}직 채용`;

  // 접수기간 (저장된 값 우선, 없으면 기본값)
  const applyDeadline = (data && data.posting_deadline) ? data.posting_deadline : '2026년 7월 10일(금) 23:59';

  const html = `
    <div class="pt-title"><span class="abl-red">[ABL생명]</span> ${dept} ${recruitType}직(${position}) 채용</div>

    <!-- 히어로 배너 -->
    <div class="pt-hero">
      <div class="pt-hero-logo">ABL</div>
      <div class="pt-hero-eyebrow">Find team members to grow together</div>
      <div class="pt-hero-title">${heroTitle}</div>
      <div class="pt-hero-sub">다음과 같이 유능하고 역량있는 인재를 채용합니다.</div>
      <div class="pt-hero-emoji">🔍</div>
    </div>

    <!-- 모집부문 및 자격요건 -->
    <div class="pt-section-title">모집부문 및 자격요건</div>
    <table class="pt-table">
      <thead>
        <tr>
          <th style="width:11%">모집부서</th>
          <th style="width:7%">채용형태</th>
          <th style="width:7%">근무형태</th>
          <th style="width:33%">주요업무</th>
          <th style="width:35%">자격요건 및 우대사항</th>
          <th style="width:7%">근무지</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="center">${dept}</td>
          <td class="center">${recruitType}</td>
          <td class="center">${empType}</td>
          <td>
            <div class="qual-head">[${position} 담당]</div>
            <ul>${dutiesList.map(d => `<li>${d}</li>`).join('')}</ul>
          </td>
          <td>
            <div class="qual-head">[필수사항]</div>
            <ul>${requiredList.map(r => `<li>${r}</li>`).join('')}</ul>
            <div class="qual-head">[우대사항]</div>
            <ul>${preferredList.map(p => `<li>${p}</li>`).join('')}</ul>
          </td>
          <td class="center">서울<br>본사</td>
        </tr>
      </tbody>
    </table>

    <!-- 전형절차 -->
    <div class="pt-section-title">전형절차</div>
    <div class="pt-process">
      ${[
        ['01', '서류전형'], ['02', '온라인 역량검사'], ['03', '1차면접'], ['04', '2차면접'], ['05', '최종합격']
      ].map((s, i) => `
        <div class="pt-process-step">
          <div class="pt-process-circle"><span class="pt-process-num">${s[0]}</span><span class="pt-process-label">${s[1]}</span></div>
        </div>
        ${i < 4 ? '<div class="pt-process-arrow"><i class="ti ti-chevron-right"></i></div>' : ''}
      `).join('')}
    </div>

    <!-- 제출서류 -->
    <div class="pt-section-title">제출서류</div>
    <ul class="pt-list">
      <li>국문 입사지원서 (온라인 작성)</li>
      <li>기타 서류는 면접전형 합격자에 한하여 추후 안내 드립니다.</li>
      <li>[채용절차의 공정화에 관한 법률 제11조 제6항]에 따라, 최종합격자를 제외한 지원자는 채용서류를 반환 받을 수 있습니다.</li>
    </ul>

    <!-- 접수기간 및 방법 -->
    <div class="pt-section-title">접수기간 및 방법
      <button class="pt-edit-deadline-btn" onclick="editPostingDeadline()"><i class="ti ti-pencil"></i> 접수기간 수정</button>
    </div>
    <ul class="pt-list">
      <li>지원서 접수기간 : <span class="hl-red" id="ptDeadline">${applyDeadline} 마감</span></li>
      <li>마감일은 접수가 급증할 것으로 예상되오니 미리 접수하시기 바랍니다.</li>
      <li>접수방법 : <span class="hl-link">에이비엘생명보험㈜ 채용 홈페이지</span>에서 온라인 지원</li>
      <li>발표방법 : 에이비엘생명 채용담당자가 개별 연락 예정</li>
    </ul>

    <!-- 유의사항 -->
    <div class="pt-notice-box">
      <div class="pt-section-title">유의사항</div>
      <ul class="pt-list">
        <li>지원서 접수는 인터넷에 한하며, 이메일 등 기타 방법에 의한 지원서 접수는 불가능합니다.</li>
        <li>지원서 접수 일정 등 전형일정은 사정에 따라 변경될 수 있으며, 이 경우 메일 및 문자 등으로 알려드립니다.</li>
        <li>문의 사항은 에이비엘생명 채용담당자 <span class="hl-link">Byeonghyun.choi@abllife.co.kr</span>로 연락 바랍니다.</li>
        <li>제출된 서류에 허위사실이 있는 경우 입사가 취소될 수 있습니다.</li>
        <li>에이비엘생명은 채용관련 법규 및 관련 규정을 준수하여 채용비리 근절에 앞장서고 있습니다.</li>
      </ul>
    </div>
  `;

  document.getElementById('postingScroll').innerHTML = html;
  document.getElementById('postingBackdrop').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closePostingPreview(e) {
  if (e && e.target.id !== 'postingBackdrop') return;
  document.getElementById('postingBackdrop').classList.remove('show');
  document.body.style.overflow = '';
}

// 접수기간 수정
function editPostingDeadline() {
  const cur = (currentData && currentData.posting_deadline) ? currentData.posting_deadline : '2026년 7월 10일(금) 23:59';
  const input = prompt('지원서 접수 마감 일시를 입력하세요.\n(예: 2026년 8월 15일(금) 23:59)', cur);
  if (input === null) return; // 취소
  const val = input.trim();
  if (!val) return;
  if (currentData) currentData.posting_deadline = val;
  const el = document.getElementById('ptDeadline');
  if (el) el.textContent = val + ' 마감';
  showJDToast('접수기간이 변경되었습니다.');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePostingPreview();
});
</script>

<!-- 최종 채용공고 미리보기 모달 -->
<div class="posting-backdrop" id="postingBackdrop" onclick="closePostingPreview(event)">

    <div class="posting-modal-bar">
      <div class="posting-modal-bar-title"><i class="ti ti-browser"></i> 채용공고 미리보기 <span>· ABL생명 채용 홈페이지 등재 형태</span></div>
      <div class="posting-modal-bar-actions">
        <button class="posting-bar-btn" onclick="alert('PDF로 저장되었습니다. (시연용)')"><i class="ti ti-download"></i> PDF 저장</button>
        <button class="posting-bar-close" onclick="closePostingPreview()"><i class="ti ti-x"></i></button>
      </div>
    </div>
    <div class="posting-scroll" id="postingScroll"></div>
  </div>
</div>
